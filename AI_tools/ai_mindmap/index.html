<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 心智圖生成器</title>
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- 引入 html2canvas 供下載圖片使用 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- 引入 pdf.js 供解析 PDF 使用 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
  <!-- 引入 JSZip 供解析 PPTX 與 DOCX 使用 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    /* 隱藏捲軸但保留功能 */
    ::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }
    /* 確保字體繼承 */
    .font-inherit {
      font-family: inherit;
    }
    /* 匯出圖片時隱藏節點上的操作按鈕 */
    .exporting .group-hover\:opacity-100 {
      opacity: 0 !important;
    }
    
    /* 允許節點被自由拉長縮放的 CSS (移到外層容器) */
    .resizable-node {
      resize: both;
      overflow: auto; /* 必須為 auto, hidden 或 scroll 才能出現 resize 縮放角 */
    }
    /* 隱藏原生醜陋的滾動條，保留右下角縮放把手 */
    .resizable-node::-webkit-scrollbar {
      display: none;
    }

    /* === 樹形圖 (由上至下) 的組織架構專屬 CSS === */
    .tree-layout ul {
      padding-top: 24px;
      position: relative;
      display: flex;
      justify-content: center;
      margin: 0;
      padding-left: 0;
    }
    .tree-layout li {
      position: relative;
      padding: 24px 12px 0 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      list-style-type: none;
    }
    /* 橫向連接線 */
    .tree-layout li::before, .tree-layout li::after {
      content: '';
      position: absolute;
      top: 0;
      right: 50%;
      border-top: 2px solid #cbd5e1;
      width: 50%;
      height: 24px;
    }
    .tree-layout li::after {
      right: auto;
      left: 50%;
      border-left: 2px solid #cbd5e1;
    }
    /* 單一子節點不顯示橫線 */
    .tree-layout li:only-child::after, .tree-layout li:only-child::before {
      display: none;
    }
    .tree-layout li:only-child {
      padding-top: 0;
    }
    /* 移除頭尾節點向外延伸的線條 */
    .tree-layout li:first-child::before, .tree-layout li:last-child::after {
      border: 0 none;
    }
    /* 修正最後一個節點的轉角垂直線 */
    .tree-layout li:last-child::before {
      border-right: 2px solid #cbd5e1;
      border-radius: 0;
    }
    /* 從父節點往下延伸的垂直線 */
    .tree-layout ul::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      border-left: 2px solid #cbd5e1;
      width: 0;
      height: 24px;
      transform: translateX(-50%);
    }
    /* 隱藏最頂層根節點上方的連接線 */
    .tree-layout.root-container > ul::before {
      display: none;
    }
    .tree-layout.root-container > ul {
      padding-top: 0;
    }
  </style>
</head>
<body class="flex flex-col h-screen bg-slate-50 font-sans overflow-hidden text-slate-800">

  <!-- Header & Controls -->

            <div class="bg-indigo-600 p-2 rounded-lg text-white">

            <button id="lang-toggle-btn" class="ml-1 flex items-center gap-1 text-sm font-medium text-slate-600 hover:text-indigo-600 transition-colors px-2 py-1 rounded-md bg-slate-100 hover:bg-slate-200 border border-slate-200" title="Switch Language / 切換語言">
              <i data-lucide="globe" class="w-4 h-4"></i>
              <span id="lang-text">EN</span>
            </button>
          </div>

          <!-- API Key Input -->
          <div class="flex items-center gap-2 bg-slate-50 px-3 py-2 rounded-xl border border-slate-200 focus-within:border-indigo-500 focus-within:ring-2 focus-within:ring-indigo-200 transition-all">
            <i data-lucide="key" class="w-4 h-4 text-slate-400"></i>
            <input
              type="password"
              id="api-key-input"
              placeholder="輸入 Qwen API Key (sk-...)"
              class="bg-transparent border-none outline-none text-sm w-full sm:w-48 text-slate-700 placeholder:text-slate-400"
            />
          </div>
        </div>

        <form id="generate-form" class="flex-1 w-full lg:max-w-2xl flex flex-col gap-2 relative">
          <div class="flex gap-2">
            <div class="relative flex-1">
              <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
              <input
                type="text"
                id="topic-input"
                value="量子電腦的原理與應用"
                placeholder="輸入任何主題... (例如：第二次世界大戰、區塊鏈技術)"
                class="w-full pl-10 pr-4 py-2.5 bg-slate-100 border-transparent focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 rounded-xl transition-all shadow-inner outline-none text-slate-700"
              />
            </div>
            
            <!-- 圖表類型選擇 -->
            <select id="diagram-type-select" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium px-3 py-2.5 rounded-xl border border-transparent focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-colors cursor-pointer shrink-0 appearance-none">
              <option value="mindmap" id="opt-mindmap">心智圖</option>
              <option value="tree" id="opt-tree">樹形圖</option>
            </select>

            <!-- 進階設定按鈕 -->
            <button type="button" id="toggle-advanced-btn" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 rounded-xl transition-colors flex items-center justify-center border border-transparent hover:border-slate-300" title="進階設定">
              <i data-lucide="sliders-horizontal" class="w-5 h-5"></i>
            </button>

            <button
              type="submit"
              id="generate-btn"
              class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-medium transition-colors flex items-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed shadow-sm shrink-0"
            >
              <i data-lucide="sparkles" id="btn-icon-normal" class="w-5 h-5"></i>
              <i data-lucide="loader-2" id="btn-icon-loading" class="w-5 h-5 animate-spin hidden"></i>
              <span id="btn-text">生成</span>
            </button>
          </div>

          <!-- 進階設定面板 -->
          <div id="advanced-panel" class="hidden flex-col gap-4 p-4 bg-white border border-slate-200 rounded-xl shadow-lg absolute top-full left-0 right-0 mt-2 z-50">
            <div>
              <label id="lbl-custom-req" class="block text-sm font-medium text-slate-700 mb-1">附加生成要求 (選填)</label>
              <textarea id="custom-req-input" rows="2" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-sm text-slate-700 transition-all resize-none" placeholder="例如：請著重在經濟方面的影響、使用專業術語..."></textarea>
            </div>
            <div>
              <label id="lbl-file-upload" class="block text-sm font-medium text-slate-700 mb-1">上傳參考文件 (支援 TXT, PDF, DOCX, PPTX...)</label>
              <input type="file" id="file-input" accept=".txt,.md,.csv,.json,.pdf,.docx,.pptx" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition-all cursor-pointer"/>
              <p id="file-status" class="text-xs text-slate-400 mt-1 hidden"></p>
            </div>
          </div>
        </form>
      </div>
    </div>
  </header>

  <!-- Main Canvas Area -->

      </button>

            <i data-lucide="image" class="w-4 h-4"></i><span id="txt-exp-png">圖片 (.png)</span>
          </button>
          <button id="export-md-btn" class="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 transition-colors flex items-center gap-2 border-t border-slate-100">
            <i data-lucide="file-text" class="w-4 h-4"></i><span id="txt-exp-md">Markdown</span>
          </button>
          <button id="export-json-btn" class="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 transition-colors flex items-center gap-2 border-t border-slate-100">
            <i data-lucide="file-code" class="w-4 h-4"></i><span id="txt-exp-json">JSON</span>
          </button>
        </div>
      </div>

      <div class="w-px h-6 bg-slate-200 mx-1"></div>

      <button id="zoom-out-btn" class="p-2 text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="縮小">
        <i data-lucide="zoom-out" class="w-5 h-5"></i>
      </button>
      <button id="reset-view-btn" class="p-2 text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="置中重置">
        <i data-lucide="maximize" class="w-5 h-5"></i>
      </button>
      <button id="zoom-in-btn" class="p-2 text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="放大">
        <i data-lucide="zoom-in" class="w-5 h-5"></i>
      </button>
    </div>

    <!-- Instructions -->
    <div class="absolute top-6 left-6 z-20 bg-white/80 backdrop-blur shadow-sm p-4 rounded-xl border border-slate-200 text-sm text-slate-600 pointer-events-auto">
      <p id="guide-title" class="font-semibold text-slate-800 mb-2">操作指南</p>
      <ul class="list-disc pl-4 space-y-1.5">
        <li id="guide-1"><span class="font-medium text-indigo-600">單擊節點</span>可直接編輯文字</li>
        <li id="guide-2"><span class="font-medium text-indigo-600">滑鼠移至節點</span>可新增或刪除</li>
        <li id="guide-3">拖曳背景可平移畫布</li>
        <li id="guide-4">Ctrl + 滾輪可縮放畫布</li>
        <li id="guide-5">拖曳節點右下角可手動拉長/縮放</li>
      </ul>
    </div>

    <!-- Error State -->
    <div id="error-container" class="absolute top-6 left-1/2 -translate-x-1/2 z-30 bg-red-50 border border-red-200 text-red-700 px-6 py-3 rounded-xl shadow-lg items-center gap-3 max-w-xl hidden">
      <i data-lucide="alert-circle" class="w-6 h-6 shrink-0 text-red-500"></i>
      <p id="error-text" class="text-sm"></p>
    </div>

    <!-- Stats Container (Token & Cost) -->

      <div id="stats-tokens" class="font-medium"></div>
      <div id="stats-cost" class="text-indigo-600 font-semibold"></div>
    </div>

    <!-- Mindmap Container -->
    <div id="mindmap-transform-container" class="absolute top-1/2 left-1/2 origin-top-left transition-transform duration-75 ease-out">
      <div id="mindmap-root" class="transition-opacity duration-500 opacity-100">
        <!-- 樹狀圖將由 JS 動態渲染在這裡 -->
      </div>
    </div>
  </main>

    let mindmapData = {
      name: "項羽的生平",
      children: [
        {
          name: "出身與早年",
          children: [
            { name: "楚國貴族後裔 (項燕之孫)" },
            { name: "少時力能扛鼎，才氣過人" },
            { name: "跟隨叔父項梁在吳中起兵反秦" }
          ]
        },
        {
          name: "崛起與稱霸",
          children: [
            { name: "鉅鹿之戰", children: [{ name: "破釜沉舟，斬殺宋義" }, { name: "大破秦軍主力 (王離、章邯)" }] },
            { name: "新安殺降 (坑殺秦降卒二十萬)" },
            { name: "入關中", children: [{ name: "火燒阿房宮" }, { name: "殺秦降王子嬰" }] },
            { name: "自立為「西楚霸王」" },
            { name: "分封十八路諸侯 (埋下日後戰亂禍根)" }
          ]
        },
        {
          name: "楚漢相爭",
          children: [
            { name: "鴻門宴", children: [{ name: "范增獻計" }, { name: "項伯求情，錯失殺劉邦良機" }] },
            { name: "彭城之戰", children: [{ name: "率三萬精兵星夜馳援" }, { name: "大破劉邦五十六萬聯軍" }] },
            { name: "滎陽對峙 (陷入拉鋸戰)" },
            { name: "鴻溝和議 (以鴻溝為界，中分天下)" }
          ]
        },
        {
          name: "敗亡",
          children: [
            { name: "垓下之戰", children: [{ name: "遭韓信等數十萬大軍合圍" }, { name: "四面楚歌，軍心渙散" }, { name: "霸王別姬 (虞姬自刎)" }] },
            { name: "烏江自刎", children: [{ name: "突圍至烏江畔" }, { name: "自認「無顏見江東父老」拒絕渡江" }, { name: "戰死沙場，年僅30歲" }] }
          ]
        },
        {
          name: "歷史評價",
          children: [
            { name: "軍事奇才", children: [{ name: "「羽之神勇，千古無二」" }] },
            { name: "政治短視", children: [{ name: "缺乏戰略眼光與政治手腕" }, { name: "匹夫之勇，婦人之仁" }] },
            { name: "性格悲劇", children: [{ name: "剛愎自用，不善用人 (氣走范增)" }, { name: "殘暴多疑 (頻繁屠城殺降)" }] }
          ]
        }
      ]
    };

    // --- State Variables ---
    let transform = { x: 0, y: 0, scale: 1 };
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let isLoading = false;
    let currentStats = null; // 儲存當次生成的 token 資訊
    let uploadedFileContent = ""; // 儲存上傳的文件內容
    let currentDiagramType = 'mindmap'; // 'mindmap' 或者是 'tree'

    // --- Undo/Redo State ---
    let historyStack = [];
    let historyIndex = -1;
    let isNavigatingHistory = false;

    // --- DOM Elements ---
    const canvas = document.getElementById('canvas');
    const transformContainer = document.getElementById('mindmap-transform-container');
    const mindmapRoot = document.getElementById('mindmap-root');
    const generateForm = document.getElementById('generate-form');
    const topicInput = document.getElementById('topic-input');
    const apiKeyInput = document.getElementById('api-key-input');
    const generateBtn = document.getElementById('generate-btn');
    const btnIconNormal = document.getElementById('btn-icon-normal');
    const btnIconLoading = document.getElementById('btn-icon-loading');
    const btnText = document.getElementById('btn-text');
    const errorContainer = document.getElementById('error-container');
    const errorText = document.getElementById('error-text');
    const statsContainer = document.getElementById('stats-container');
    const statsTokensEl = document.getElementById('stats-tokens');
    const statsCostEl = document.getElementById('stats-cost');

    const toggleAdvancedBtn = document.getElementById('toggle-advanced-btn');
    const advancedPanel = document.getElementById('advanced-panel');
    const customReqInput = document.getElementById('custom-req-input');
    const fileInput = document.getElementById('file-input');
    const fileStatus = document.getElementById('file-status');
    const diagramTypeSelect = document.getElementById('diagram-type-select');
    
    const exportMenu = document.getElementById('export-menu');
    const txtExpPng = document.getElementById('txt-exp-png');
    const txtExpMd = document.getElementById('txt-exp-md');
    const txtExpJson = document.getElementById('txt-exp-json');
    const optMindmap = document.getElementById('opt-mindmap');
    const optTree = document.getElementById('opt-tree');
    
    const undoBtn = document.getElementById('undo-btn');
    const redoBtn = document.getElementById('redo-btn');

    // --- Helper Functions & Core Logic ---
    
    // History Management
    const saveHistory = () => {
      if (isNavigatingHistory) return;
      // 若有新動作，則捨棄當前索引之後的所有復原步驟
      historyStack = historyStack.slice(0, historyIndex + 1);
      historyStack.push(JSON.stringify(mindmapData));
      
      // 限制歷史長度為 50 步，避免記憶體佔用過大
      if (historyStack.length > 50) {
        historyStack.shift();
      } else {
        historyIndex++;
      }
      updateUndoRedoUI();
    };

    const undo = () => {
      if (historyIndex > 0) {
        historyIndex--;
        isNavigatingHistory = true;
        mindmapData = JSON.parse(historyStack[historyIndex]);
        renderTree();
        isNavigatingHistory = false;
        updateUndoRedoUI();
      }
    };

    const redo = () => {
      if (historyIndex < historyStack.length - 1) {
        historyIndex++;
        isNavigatingHistory = true;
        mindmapData = JSON.parse(historyStack[historyIndex]);
        renderTree();
        isNavigatingHistory = false;
        updateUndoRedoUI();
      }
    };

    const updateUndoRedoUI = () => {
      if (historyIndex > 0) {
        undoBtn.disabled = false;
        undoBtn.classList.remove('text-slate-400');
        undoBtn.classList.add('text-slate-600', 'cursor-pointer');
      } else {
        undoBtn.disabled = true;
        undoBtn.classList.add('text-slate-400');
        undoBtn.classList.remove('text-slate-600', 'cursor-pointer');
      }
      
      if (historyIndex < historyStack.length - 1) {
        redoBtn.disabled = false;
        redoBtn.classList.remove('text-slate-400');
        redoBtn.classList.add('text-slate-600', 'cursor-pointer');
      } else {
        redoBtn.disabled = true;
        redoBtn.classList.add('text-slate-400');
        redoBtn.classList.remove('text-slate-600', 'cursor-pointer');
      }
    };

    const escapeHTML = (str) => {
      return str.replace(/[&<>'"]/g, tag => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[tag]));
    };

    const getNodeClasses = (lvl, type) => {
      // 根據圖表類型調整圓角與外觀
      const isTree = type === 'tree';
      const radiusRoot = isTree ? 'rounded-md' : 'rounded-2xl';
      const radiusL1 = isTree ? 'rounded-md' : 'rounded-xl';
      const radiusL2 = isTree ? 'rounded-sm' : 'rounded-lg';
      const radiusL3 = isTree ? 'rounded-sm' : 'rounded-md';

      // 加高 min-height 與 py-padding，解決「框太扁」的問題
      switch (lvl) {
        case 0: return `bg-slate-900 text-white shadow-xl text-lg font-bold border-2 border-slate-700 py-4 px-8 min-h-[4.5rem] min-w-[140px] ${radiusRoot}`;
        case 1: return `bg-indigo-600 text-white shadow-md font-semibold py-3 px-6 min-h-[3.5rem] min-w-[120px] ${radiusL1}`;
        case 2: return `bg-blue-100 text-blue-900 shadow-sm font-medium py-2.5 px-5 min-h-[3rem] min-w-[100px] ${radiusL2} border border-blue-200`;
        default: return `bg-white text-slate-700 shadow-sm py-2 px-4 min-h-[2.5rem] min-w-[80px] ${radiusL3} border border-slate-200 text-sm`;
      }
    };

    const fetchWithRetry = async (url, options, maxRetries = 5) => {
      let retries = 0;
      while (retries < maxRetries) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) {
            const errorStr = await response.text();
            let serverMessage = `HTTP status: ${response.status}`;
            let errorCode = '';
            try {
              const errorData = JSON.parse(errorStr);
              serverMessage = errorData.message || errorData.error?.message || errorStr;
              errorCode = errorData.code || errorData.error?.code || '';
            } catch (e) {
              serverMessage = errorStr || serverMessage;
            }
            if (response.status === 401) {
              const msg = currentLang === 'en' 
                ? `Auth Failed (401) [${errorCode}]: ${serverMessage}. Possible reasons: 1. Invalid Key 2. Model service not activated 3. Arrears.`
                : `授權失敗 (401) [${errorCode}]: ${serverMessage}。可能原因：1. 密鑰錯誤 2. 帳號未開通模型服務 3. 帳號欠費。`;
              throw new Error(msg);
            }
            throw new Error(`[${errorCode}] ${serverMessage}`);
          }
          return await response.json();
        } catch (error) {
          retries++;
          if (error.message.includes("401")) throw error;
          if (retries >= maxRetries) throw error;
          const delay = Math.pow(2, retries) * 1000;
          await new Promise(resolve => setTimeout(resolve, delay));
        }
      }
    };

    const getTargetData = (pathStr) => {
      if (!pathStr) return mindmapData;
      const indices = pathStr.split(',').map(Number);
      let current = mindmapData;
      for (let i of indices) {
        current = current.children[i];
      }
      return current;
    };

    const getParentDataAndIndex = (pathStr) => {
      const indices = pathStr.split(',').map(Number);
      const targetIndex = indices.pop();
      let parent = mindmapData;
      for (let i of indices) {
        parent = parent.children[i];
      }
      return { parent, targetIndex };
    };

    const updateNode = (pathStr, newText) => {
      const target = getTargetData(pathStr);
      if (target.name === newText) return;
      target.name = newText;
      saveHistory();
      renderTree();
    };

    const addNode = (pathStr) => {
      const target = getTargetData(pathStr);
      if (!target.children) target.children = [];
      target.children.push({ name: i18n[currentLang].newNodeText });
      saveHistory();
      renderTree();
    };

    const deleteNode = (pathStr) => {
      if (!pathStr) return; // 不允許刪除根節點
      const { parent, targetIndex } = getParentDataAndIndex(pathStr);
      parent.children.splice(targetIndex, 1);
      saveHistory();
      renderTree();
    };

    const buildNodeHTML = (node, pathStr = "", level = 0, isRoot = true, type = 'mindmap', direction = 'right') => {
      const hasChildren = node.children && node.children.length > 0;
      const nodeClasses = getNodeClasses(level, type);
      
      // 擷取使用者手動拖曳設定好的寬高，將其綁定回資料模型確保不會在重新渲染時丟失
      const widthStyle = node.width ? `width: ${node.width};` : '';
      const heightStyle = node.height ? `height: ${node.height};` : '';
      const styleAttrContainer = (widthStyle || heightStyle) ? `style="${widthStyle} ${heightStyle}"` : '';
      
      // 取消原本的 transition-all (改為 transition-shadow 以避免原生的拖拽調整邊框出現詭異的回彈動畫)
      // 將 resize 樣式移動到容器層，而不是文字層，修復一併變寬的 bug
      const nodeUI = `
        <div class="relative flex items-center justify-center group z-10 node-container">
          <div class="resizable-node transition-shadow duration-300 hover:shadow-lg ${nodeClasses} cursor-pointer text-center flex flex-col items-center justify-center" ${styleAttrContainer} data-path="${pathStr}">
            <div class="whitespace-pre-wrap break-words node-text leading-relaxed w-full h-full flex items-center justify-center">${escapeHTML(node.name)}</div>
            
            <!-- Hover Action Buttons -->
            <div class="absolute -top-3 ${direction === 'left' ? '-left-12' : '-right-4'} opacity-0 group-hover:opacity-100 flex gap-1 transition-opacity bg-white shadow-md border border-slate-200 rounded-lg p-1 z-30">
              <button class="add-btn p-1.5 hover:bg-indigo-50 hover:text-indigo-600 rounded-md text-slate-400 transition-colors" title="${i18n[currentLang].ttAddNode}" data-path="${pathStr}">
                <i data-lucide="plus" class="w-3.5 h-3.5 pointer-events-none"></i>
              </button>
              ${!isRoot ? `
              <button class="delete-btn p-1.5 hover:bg-red-50 hover:text-red-600 rounded-md text-slate-400 transition-colors" title="${i18n[currentLang].ttDeleteNode}" data-path="${pathStr}">
                <i data-lucide="trash-2" class="w-3.5 h-3.5 pointer-events-none"></i>
              </button>
              ` : ''}
            </div>
          </div>
        </div>
      `;

      if (type === 'tree') {
        // === 樹形圖 (垂直向下) 的渲染邏輯 ===
        let html = `<li>${nodeUI}`;
        if (hasChildren) {
          html += `<ul>`;
          node.children.forEach((child, index) => {
            const childPath = pathStr ? `${pathStr},${index}` : `${index}`;
            html += buildNodeHTML(child, childPath, level + 1, false, type, direction);
          });
          html += `</ul>`;
        }
        html += `</li>`;
        
        // 如果是遞迴的最外層，包裝專屬的容器 class
        if (isRoot) {
          return `<div class="tree-layout root-container"><ul>${html}</ul></div>`;
        }
        return html;

      } else {
        // === 心智圖 (水平向兩側發散) 的渲染邏輯 ===
        if (isRoot) {
          // 根節點：將子節點平分到左右兩側
          const children = node.children || [];
          const half = Math.ceil(children.length / 2);
          const leftChildren = children.slice(0, half);
          const rightChildren = children.slice(half);

          let html = `<div class="flex items-center justify-center">`;

          // 1. 左側分支
          if (leftChildren.length > 0) {
            html += `<div class="relative flex flex-col items-end pr-10 md:pr-12">`;
            html += `<div class="absolute right-0 top-1/2 w-5 md:w-6 h-[2px] bg-slate-300 -translate-y-1/2 transition-colors"></div>`;
            leftChildren.forEach((child, index) => {
              const childPath = pathStr ? `${pathStr},${index}` : `${index}`;
              const isFirst = index === 0;
              const isLast = index === leftChildren.length - 1;
              html += `<div class="relative py-2.5 flex items-center justify-end">`;
              html += `<div class="absolute right-5 md:right-6 w-[2px] bg-slate-300 transition-colors" style="top: ${isFirst ? '50%' : '0'}; bottom: ${isLast ? '50%' : '0'};"></div>`;
              html += `<div class="absolute right-5 md:right-6 top-1/2 w-5 md:w-6 h-[2px] bg-slate-300 -translate-y-1/2 transition-colors"></div>`;
              html += buildNodeHTML(child, childPath, level + 1, false, type, 'left');
              html += `</div>`;
            });
            html += `</div>`;
          }

          // 2. 中間根節點
          html += `<div class="z-20">${nodeUI}</div>`;

          // 3. 右側分支
          if (rightChildren.length > 0) {
            html += `<div class="relative flex flex-col items-start pl-10 md:pl-12">`;
            html += `<div class="absolute left-0 top-1/2 w-5 md:w-6 h-[2px] bg-slate-300 -translate-y-1/2 transition-colors"></div>`;
            rightChildren.forEach((child, index) => {
              const realIndex = half + index;
              const childPath = pathStr ? `${pathStr},${realIndex}` : `${realIndex}`;
              const isFirst = index === 0;
              const isLast = index === rightChildren.length - 1;
              html += `<div class="relative py-2.5 flex items-center justify-start">`;
              html += `<div class="absolute left-5 md:left-6 w-[2px] bg-slate-300 transition-colors" style="top: ${isFirst ? '50%' : '0'}; bottom: ${isLast ? '50%' : '0'};"></div>`;
              html += `<div class="absolute left-5 md:left-6 top-1/2 w-5 md:w-6 h-[2px] bg-slate-300 -translate-y-1/2 transition-colors"></div>`;
              html += buildNodeHTML(child, childPath, level + 1, false, type, 'right');
              html += `</div>`;
            });
            html += `</div>`;
          }
          
          html += `</div>`;
          return html;
        } else {
          // 非根節點：根據其方向 (左或右) 繼續向外生長
          let html = `<div class="flex items-center ${direction === 'left' ? 'flex-row-reverse' : 'flex-row'}">`;
          html += `<div class="z-20">${nodeUI}</div>`;
          
          if (hasChildren) {
            if (direction === 'left') {
              html += `<div class="relative flex flex-col items-end pr-10 md:pr-12">`;
              html += `<div class="absolute right-0 top-1/2 w-5 md:w-6 h-[2px] bg-slate-300 -translate-y-1/2 transition-colors group-hover:bg-indigo-300"></div>`;
              node.children.forEach((child, index) => {
                const childPath = `${pathStr},${index}`;
                const isFirst = index === 0;
                const isLast = index === node.children.length - 1;
                html += `<div class="relative py-2.5 flex items-center justify-end">`;
                html += `<div class="absolute right-5 md:right-6 w-[2px] bg-slate-300 transition-colors group-hover:bg-indigo-300" style="top: ${isFirst ? '50%' : '0'}; bottom: ${isLast ? '50%' : '0'};"></div>`;
                html += `<div class="absolute right-5 md:right-6 top-1/2 w-5 md:w-6 h-[2px] bg-slate-300 -translate-y-1/2 transition-colors group-hover:bg-indigo-300"></div>`;
                html += buildNodeHTML(child, childPath, level + 1, false, type, 'left');
                html += `</div>`;
              });
              html += `</div>`;
            } else {
              html += `<div class="relative flex flex-col items-start pl-10 md:pl-12">`;
              html += `<div class="absolute left-0 top-1/2 w-5 md:w-6 h-[2px] bg-slate-300 -translate-y-1/2 transition-colors group-hover:bg-indigo-300"></div>`;
              node.children.forEach((child, index) => {
                const childPath = `${pathStr},${index}`;
                const isFirst = index === 0;
                const isLast = index === node.children.length - 1;
                html += `<div class="relative py-2.5 flex items-center justify-start">`;
                html += `<div class="absolute left-5 md:left-6 w-[2px] bg-slate-300 transition-colors group-hover:bg-indigo-300" style="top: ${isFirst ? '50%' : '0'}; bottom: ${isLast ? '50%' : '0'};"></div>`;
                html += `<div class="absolute left-5 md:left-6 top-1/2 w-5 md:w-6 h-[2px] bg-slate-300 -translate-y-1/2 transition-colors group-hover:bg-indigo-300"></div>`;
                html += buildNodeHTML(child, childPath, level + 1, false, type, 'right');
                html += `</div>`;
              });
              html += `</div>`;
            }
          }
          html += `</div>`;
          return html;
        }
      }
    };

    // 利用 ResizeObserver 動態追蹤使用者手動拉長的設定值並存回資料庫
    let resizeTimeout;
    const nodeResizeObserver = new ResizeObserver(entries => {
      let hasChanges = false;
      for (let entry of entries) {
        const el = entry.target;
        if (el.style.width || el.style.height) {
          const path = el.dataset.path;
          if (path !== undefined && path !== null) {
            const target = getTargetData(path);
            if (target) {
              if (el.style.width && target.width !== el.style.width) {
                target.width = el.style.width;
                hasChanges = true;
              }
              if (el.style.height && target.height !== el.style.height) {
                target.height = el.style.height;
                hasChanges = true;
              }
            }
          }
        }
      }
      // 防抖機制：當使用者手動調整完尺寸後，等待0.5秒自動將新尺寸寫入歷史紀錄 (Undo)
      if (hasChanges && !isNavigatingHistory) {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          saveHistory();
        }, 500);
      }
    });

    const renderTree = () => {
      nodeResizeObserver.disconnect();
      mindmapRoot.innerHTML = buildNodeHTML(mindmapData, "", 0, true, currentDiagramType);
      lucide.createIcons();
      // 為所有可縮放節點外層掛載縮放監聽器
      document.querySelectorAll('.resizable-node').forEach(el => nodeResizeObserver.observe(el));
    };

    const updateTransformStyle = () => {
      transformContainer.style.transform = `translate(calc(-50% + ${transform.x}px), calc(-50% + ${transform.y}px)) scale(${transform.scale})`;
    };

    const resetView = () => {
      transform = { x: 0, y: 0, scale: 1 };
      updateTransformStyle();
    };

    const handleZoom = (delta) => {
      transform.scale = Math.min(Math.max(0.2, transform.scale + delta), 3);
      updateTransformStyle();
    };

    const showError = (msg) => {
      if (msg) {
        errorText.textContent = msg;
        errorContainer.classList.remove('hidden');
        errorContainer.classList.add('flex');
      } else {
        errorContainer.classList.add('hidden');
        errorContainer.classList.remove('flex');
      }
    };

    const setLoading = (loading) => {
      const t = i18n[currentLang];
      isLoading = loading;
      topicInput.disabled = loading;
      generateBtn.disabled = loading;
      customReqInput.disabled = loading;
      fileInput.disabled = loading;
      diagramTypeSelect.disabled = loading;
      
      if (loading) {
        btnIconNormal.classList.add('hidden');
        btnIconLoading.classList.remove('hidden');
        btnText.textContent = t.btnGenerating;
        mindmapRoot.classList.add('opacity-30', 'blur-sm', 'pointer-events-none');
        statsContainer.classList.add('hidden');
        statsContainer.classList.remove('flex');
      } else {
        btnIconNormal.classList.remove('hidden');
        btnIconLoading.classList.add('hidden');
        btnText.textContent = t.btnGenerate;
        mindmapRoot.classList.remove('opacity-30', 'blur-sm', 'pointer-events-none');
      }
    };

    // --- Language Update Logic ---
    const updateStatsUI = () => {
      if (!currentStats) return;
      const t = i18n[currentLang];
      statsTokensEl.textContent = t.statsTokens
        .replace('{total}', currentStats.total_tokens)
        .replace('{in}', currentStats.prompt_tokens)
        .replace('{out}', currentStats.completion_tokens);
      statsCostEl.textContent = t.statsCost
        .replace('{cost}', currentStats.cost.toFixed(5));
      statsContainer.classList.remove('hidden');
      statsContainer.classList.add('flex');
    };

    const updateLanguageUI = () => {
      const t = i18n[currentLang];
      document.getElementById('app-title').textContent = t.appTitle;
      document.getElementById('lang-text').textContent = t.langBtn;
      apiKeyInput.placeholder = t.apiKeyPlaceholder;
      topicInput.placeholder = t.topicPlaceholder;
      if (!isLoading) btnText.textContent = t.btnGenerate;
      else btnText.textContent = t.btnGenerating;
      
      optMindmap.textContent = t.optMindmap;
      optTree.textContent = t.optTree;

      document.getElementById('guide-title').textContent = t.guideTitle;
      document.getElementById('guide-1').innerHTML = t.guide1;
      document.getElementById('guide-2').innerHTML = t.guide2;
      document.getElementById('guide-3').textContent = t.guide3;
      document.getElementById('guide-4').textContent = t.guide4;
      document.getElementById('guide-5').textContent = t.guide5;

      document.getElementById('undo-btn').title = t.ttUndo;
      document.getElementById('redo-btn').title = t.ttRedo;
      document.getElementById('download-btn').title = t.ttDownload;
      document.getElementById('zoom-out-btn').title = t.ttZoomOut;
      document.getElementById('reset-view-btn').title = t.ttReset;
      document.getElementById('zoom-in-btn').title = t.ttZoomIn;

      document.getElementById('lbl-custom-req').textContent = t.lblCustomReq;
      document.getElementById('lbl-file-upload').textContent = t.lblFileUpload;
      customReqInput.placeholder = t.phCustomReq;
      toggleAdvancedBtn.title = t.ttAdvanced;

      txtExpPng.textContent = t.expPng;
      txtExpMd.textContent = t.expMd;
      txtExpJson.textContent = t.expJson;

      if (currentStats) updateStatsUI();

      // Re-render tree to apply new translated tooltips
      renderTree();
    };

    // --- Event Listeners ---
    document.getElementById('lang-toggle-btn').addEventListener('click', () => {
      currentLang = currentLang === 'zh-TW' ? 'en' : 'zh-TW';
      if (topicInput.value === '量子電腦的原理與應用' && currentLang === 'en') {
        topicInput.value = 'Principles and Applications of Quantum Computing';
      } else if (topicInput.value === 'Principles and Applications of Quantum Computing' && currentLang === 'zh-TW') {
        topicInput.value = '量子電腦的原理與應用';
      }
      updateLanguageUI();
    });

    // Toolbar Buttons & Canvas Pan/Zoom
    document.getElementById('undo-btn').addEventListener('click', undo);
    document.getElementById('redo-btn').addEventListener('click', redo);
    document.getElementById('zoom-in-btn').addEventListener('click', () => handleZoom(0.2));
    document.getElementById('zoom-out-btn').addEventListener('click', () => handleZoom(-0.2));
    document.getElementById('reset-view-btn').addEventListener('click', resetView);

    // 鍵盤快捷鍵 (Ctrl+Z / Ctrl+Y)
    document.addEventListener('keydown', (e) => {
      const target = e.target;
      const isInput = target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.tagName === 'SELECT';
      
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        if (!isInput) {
          e.preventDefault();
          if (e.shiftKey) redo();
          else undo();
        }
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'y') {
        if (!isInput) {
          e.preventDefault();
          redo();
        }
      }
    });

    canvas.addEventListener('mousedown', (e) => {
      if (e.target.closest('.node-container')) return;
      isDragging = true;
      dragStart = { x: e.clientX - transform.x, y: e.clientY - transform.y };
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      transform.x = e.clientX - dragStart.x;
      transform.y = e.clientY - dragStart.y;
      updateTransformStyle();
    });

    window.addEventListener('mouseup', () => isDragging = false);
    
    canvas.addEventListener('wheel', (e) => {
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        const zoomFactor = -e.deltaY * 0.005;
        handleZoom(zoomFactor);
      } else {
        transform.x -= e.deltaX;
        transform.y -= e.deltaY;
        updateTransformStyle();
      }
    }, { passive: false });

    // 進階面板與匯出選單切換
    toggleAdvancedBtn.addEventListener('click', () => {
      advancedPanel.classList.toggle('hidden');
      advancedPanel.classList.toggle('flex');
    });

    document.getElementById('download-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      exportMenu.classList.toggle('hidden');
      exportMenu.classList.toggle('flex');
    });

    // 當切換圖表類型時，僅重新渲染當前資料以反應不同形狀風格，不主動打 API
    diagramTypeSelect.addEventListener('change', (e) => {
      currentDiagramType = e.target.value;
      renderTree();
    });

    // 點擊外部時自動關閉下拉面板
    document.addEventListener('click', (e) => {
      if (!advancedPanel.contains(e.target) && !toggleAdvancedBtn.contains(e.target) && !advancedPanel.classList.contains('hidden')) {
        advancedPanel.classList.add('hidden');
        advancedPanel.classList.remove('flex');
      }
      
      if (!exportMenu.contains(e.target) && e.target.closest('#download-btn') === null && !exportMenu.classList.contains('hidden')) {
        exportMenu.classList.add('hidden');
        exportMenu.classList.remove('flex');
      }
    });

    // 處理檔案上傳與文本萃取 (PDF, PPTX, DOCX, TXT)
    fileInput.addEventListener('change', async (e) => {
      const t = i18n[currentLang];
      const file = e.target.files[0];
      
      if (!file) {
        uploadedFileContent = "";
        fileStatus.classList.add('hidden');
        return;
      }

      // 檢查檔案大小 (放寬到 10MB)
      if (file.size > 10 * 1024 * 1024) {
        showError(t.errFileTooLarge);
        e.target.value = '';
        uploadedFileContent = "";
        fileStatus.classList.add('hidden');
        return;
      }

      // 顯示解析中提示
      fileStatus.textContent = t.fileParsing;
      fileStatus.classList.remove('hidden', 'text-red-500', 'text-indigo-600');
      fileStatus.classList.add('text-slate-500');

      try {
        const ext = file.name.split('.').pop().toLowerCase();
        let extractedText = "";

        // 1. 純文本類
        if (['txt', 'md', 'csv', 'json'].includes(ext)) {
          extractedText = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = evt => resolve(evt.target.result);
            reader.onerror = reject;
            reader.readAsText(file);
          });
        } 
        // 2. PDF 解析
        else if (ext === 'pdf') {
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            extractedText += textContent.items.map(item => item.str).join(' ') + '\n';
          }
        } 
        // 3. Office 檔案 (利用 JSZip 解開 XML 萃取文字)
        else if (['docx', 'pptx'].includes(ext)) {
          const arrayBuffer = await file.arrayBuffer();
          const zip = await JSZip.loadAsync(arrayBuffer);
          
          if (ext === 'docx') {
            const docXml = zip.file("word/document.xml");
            if (docXml) {
              const xmlString = await docXml.async("string");
              const matches = xmlString.match(/<w:t[^>]*>(.*?)<\/w:t>/g);
              if (matches) extractedText = matches.map(m => m.replace(/<[^>]+>/g, '')).join('\n');
            }
          } else if (ext === 'pptx') {
            const slideFiles = Object.keys(zip.files).filter(name => name.startsWith('ppt/slides/slide') && name.endsWith('.xml'));
            // 確保簡報按順序解析
            slideFiles.sort((a, b) => parseInt(a.match(/\d+/)[0]) - parseInt(b.match(/\d+/)[0]));
            
            for (const slideFile of slideFiles) {
              const xmlString = await zip.file(slideFile).async("string");
              const matches = xmlString.match(/<a:t[^>]*>(.*?)<\/a:t>/g);
              if (matches) extractedText += matches.map(m => m.replace(/<[^>]+>/g, '')).join(' ') + '\n';
            }
          }
        } else {
          throw new Error("不支援的檔案格式");
        }

        // 避免萃取的文本太大導致 API 請求失敗，限制在約 30,000 字
        if (extractedText.length > 30000) {
          extractedText = extractedText.substring(0, 30000) + '\n\n...[內容過長已截斷]...';
        }

        uploadedFileContent = extractedText;
        fileStatus.textContent = t.fileLoaded.replace('{name}', file.name);
        fileStatus.classList.remove('text-slate-500');
        fileStatus.classList.add('text-indigo-600');
      } catch (err) {
        console.error("解析文件錯誤:", err);
        showError(t.errFileRead);
        fileStatus.textContent = t.errFileRead;
        fileStatus.classList.remove('text-slate-500');
        fileStatus.classList.add('text-red-500');
        e.target.value = '';
        uploadedFileContent = "";
      }
    });

    // --- 匯出功能邏輯 ---
    // 1. 下載為 PNG 圖片
    document.getElementById('export-png-btn').addEventListener('click', async () => {
      exportMenu.classList.add('hidden');
      exportMenu.classList.remove('flex');
      const downloadBtn = document.getElementById('download-btn');
      const originalHTML = downloadBtn.innerHTML;
      
      try {
        // 顯示載入中動畫
        downloadBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>';
        lucide.createIcons();
        
        // 加上 exporting 樣式：隱藏懸浮按鈕、增加背景色與內距，確保截圖美觀
        mindmapRoot.classList.add('exporting', 'p-12', 'bg-slate-50', 'rounded-2xl');
        
        // 短暫等待 DOM 重新渲染
        await new Promise(resolve => setTimeout(resolve, 150));

        // 擷取目標為 mindmapRoot，不包含畫布的縮放(Transform)偏移，確保圖形完整
        const canvasObj = await html2canvas(mindmapRoot, {
          backgroundColor: '#f8fafc', // 對應 tailwind slate-50
          scale: 2, // 提高圖片解析度 (Retina 畫質)
          logging: false,
          useCORS: true
        });

        // 建立下載連結並觸發
        const link = document.createElement('a');
        link.download = `${mindmapData.name || 'AI_圖表'}.png`;
        link.href = canvasObj.toDataURL('image/png');
        link.click();
      } catch (err) {
        console.error('下載圖片失敗:', err);
        showError('下載圖片失敗，請稍後再試。');
      } finally {
        // 復原 DOM 樣式與按鈕狀態
        mindmapRoot.classList.remove('exporting', 'p-12', 'bg-slate-50', 'rounded-2xl');
        downloadBtn.innerHTML = originalHTML;
        lucide.createIcons();
      }
    });

    // 2. 下載為 Markdown
    document.getElementById('export-md-btn').addEventListener('click', () => {
      exportMenu.classList.add('hidden');
      exportMenu.classList.remove('flex');
      
      const generateMD = (node, level) => {
        let md = `${"  ".repeat(level)}- ${node.name}\n`;
        if (node.children) {
          node.children.forEach(child => {
            md += generateMD(child, level + 1);
          });
        }
        return md;
      };

      const mdContent = generateMD(mindmapData, 0);
      const blob = new Blob([mdContent], { type: 'text/markdown;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `${mindmapData.name || 'AI_圖表'}.md`;
      link.click();
      URL.revokeObjectURL(link.href);
    });

    // 3. 下載為 JSON
    document.getElementById('export-json-btn').addEventListener('click', () => {
      exportMenu.classList.add('hidden');
      exportMenu.classList.remove('flex');
      
      const jsonContent = JSON.stringify(mindmapData, null, 2);
      const blob = new Blob([jsonContent], { type: 'application/json;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `${mindmapData.name || 'AI_圖表'}.json`;
      link.click();
      URL.revokeObjectURL(link.href);
    });

    // 2. Node Interactions (Event Delegation)
    mindmapRoot.addEventListener('click', (e) => {
      // 處理新增
      const addBtn = e.target.closest('.add-btn');
      if (addBtn) {
        e.stopPropagation();
        addNode(addBtn.dataset.path);
        return;
      }

      // 處理刪除
      const deleteBtn = e.target.closest('.delete-btn');
      if (deleteBtn) {
        e.stopPropagation();
        deleteNode(deleteBtn.dataset.path);
        return;
      }

      // 處理編輯
      // 改為從 resizable-node 裡面尋找文字容器，這樣替換成 Textarea 後才能完整撐滿父元素
      const containerNode = e.target.closest('.resizable-node');
      if (containerNode && !containerNode.querySelector('textarea') && !e.target.closest('button')) {
        e.stopPropagation();
        
        const textNode = containerNode.querySelector('.node-text');
        if (!textNode) return;
        
        const currentText = textNode.textContent;
        const pathStr = textNode.dataset.path;
        
        // 替換為 textarea，並自動套用 w-full h-full 佔滿由外層 resizable-node 掌控的空間
        const textarea = document.createElement('textarea');
        textarea.value = currentText;
        textarea.className = "bg-transparent outline-none w-full h-full resize-none overflow-hidden text-inherit font-inherit leading-relaxed p-0 m-0 border-none focus:ring-0 block text-center flex-1";
        
        textNode.replaceWith(textarea);
        
        // 游標放最後面
        textarea.focus();
        textarea.selectionStart = textarea.value.length;
        textarea.selectionEnd = textarea.value.length;

        const saveEdit = () => {
          const val = textarea.value.trim();
          if (val !== currentText) {
            updateNode(pathStr, val || i18n[currentLang].unnamedNode);
          } else {
            renderTree(); // 恢復原狀
          }
        };

        textarea.addEventListener('blur', saveEdit);
        textarea.addEventListener('keydown', (evt) => {
          if (evt.key === 'Enter' && !evt.shiftKey) {
            evt.preventDefault();
            textarea.blur(); // 觸發 blur 執行 save
          } else if (evt.key === 'Escape') {
            renderTree(); // 放棄編輯
          }
        });
      }
    });

    // 3. API Generation
    generateForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const topic = topicInput.value.trim();
      const customReq = customReqInput.value.trim();
      // 在送出前更新目前的圖表類型
      currentDiagramType = diagramTypeSelect.value;
      const t = i18n[currentLang];
      
      if (!topic) return;

      const cleanApiKey = apiKeyInput.value.trim();
      if (!cleanApiKey) {
        showError(t.errNoKey);
        return;
      }

      if (!cleanApiKey.startsWith("sk-")) {
        showError(t.errKeyFormat);
        return;
      }

      setLoading(true);
      showError(null);
      // 送出時自動收合進階選單
      advancedPanel.classList.add('hidden');
      advancedPanel.classList.remove('flex');

      const prompt = t.promptTpl(topic, customReq, uploadedFileContent, currentDiagramType);

      try {
        const url = 'https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions';
        const payload = {
          model: "qwen-plus",
          messages: [
            { role: "system", content: t.promptSystem },
            { role: "user", content: prompt }
          ],
          temperature: 0.3
        };

        const result = await fetchWithRetry(url, {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "Authorization": `Bearer ${cleanApiKey}`
          },
          body: JSON.stringify(payload)
        });

        let textResponse = result.choices?.[0]?.message?.content;
        let usage = result.usage;
        if (!textResponse) throw new Error(t.errApiNoText);

        // 紀錄 Token 與成本 (以 qwen-plus 國際版標準定價估算，並轉換為 HKD，匯率約 1 USD = 7.8 HKD)
        // 輸入約 $0.0004 USD / 1k tokens, 輸出約 $0.0012 USD / 1k tokens
        if (usage) {
          const promptTokens = usage.prompt_tokens || 0;
          const completionTokens = usage.completion_tokens || 0;
          const totalTokens = usage.total_tokens || 0;
          const costUSD = (promptTokens * 0.0004 / 1000) + (completionTokens * 0.0012 / 1000);
          const costHKD = costUSD * 7.8;
          
          currentStats = {
            prompt_tokens: promptTokens,
            completion_tokens: completionTokens,
            total_tokens: totalTokens,
            cost: costHKD
          };
          updateStatsUI();
        }

        // 清理可能包含的 Markdown 標記
        textResponse = textResponse.replace(/```json\n?/gi, '').replace(/```\n?/g, '').trim();

        const parsedData = JSON.parse(textResponse);
        
        if (!parsedData.name || !parsedData.children) {
          throw new Error(t.errApiJson);
        }

        mindmapData = parsedData;
        saveHistory();
        resetView();
        renderTree();
      } catch (err) {
        console.error(err);
        showError(err.message || t.errApiFail);
      } finally {
        setLoading(false);
      }
    });

    // --- Initialization ---
    // 呼叫 Lucide 解析初始載入的 Header UI Icon
    lucide.createIcons();
    // 儲存最初始的狀態並渲染
    saveHistory();
    renderTree();
    updateTransformStyle();

  </script>
</body>
</html>
