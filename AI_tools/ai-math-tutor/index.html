<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 數學導師管理系統</title>
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 載入 Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- 載入 html2pdf 用於匯出 PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; background-color: #f8fafc; }
    .print-container { background: white; padding: 40px; }
  </style>
</head>
<body class="text-slate-900">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      BookOpen, BrainCircuit, BarChart2, Settings, 
      ChevronRight, CheckCircle, XCircle, Award, 
      AlertCircle, Loader2, PlayCircle, Clock, PartyPopper,
      Users, UserPlus, Cloud, CloudOff, Info,
      BookmarkX, Target, PenTool, Trash2, LogOut, Lock, User,
      Send, FileText, FileUp, Download, Edit3, Image as ImageIcon, PlusCircle
    } from 'https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0';

    // --- Firebase Modules ---
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js';

    // --- Firebase Config ---
    const firebaseConfig = {
      apiKey: "AIzaSyBmSOc6Xbnqhe9FVQS2SjFhWpXq75iSBX8",
      authDomain: "ai-math-system-c239f.firebaseapp.com",
      projectId: "ai-math-system-c239f",
      storageBucket: "ai-math-system-c239f.firebasestorage.app",
      messagingSenderId: "854186745107",
      appId: "1:854186745107:web:64227aad20bcbba29d8ee6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const appId = 'ai-math-system-c239f'; 

    // --- Utils ---
    const GRADES = ['小一', '小二', '小三', '小四', '小五', '小六', '中一', '中二', '中三', '中四', '中五', '中六'];
    
    const formatMathText = (text) => {
      if (typeof text !== 'string') return text;
      return text.replace(/\\times/g, ' × ').replace(/\\div/g, ' ÷ ').replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, '$1/$2').replace(/\\circ/g, '°').replace(/\\pi/g, 'π').replace(/\\leq/g, '≤').replace(/\\geq/g, '≥').replace(/\\neq/g, '≠').replace(/\\approx/g, '≈').replace(/\^2/g, '²').replace(/\^3/g, '³').replace(/\\sqrt\{([^}]+)\}/g, '√($1)').replace(/\$|\\\(|\\\)/g, '');
    };

    // 強化版 JSON 解析器
    const extractJSON = (text) => {
      try {
        let cleanText = text.replace(/```json/gi, '').replace(/```/g, '').trim();
        const startIdx = Math.min(
          cleanText.indexOf('{') !== -1 ? cleanText.indexOf('{') : Infinity,
          cleanText.indexOf('[') !== -1 ? cleanText.indexOf('[') : Infinity
        );
        const endIdx = Math.max(cleanText.lastIndexOf('}'), cleanText.lastIndexOf(']'));
        
        if (startIdx !== Infinity && endIdx !== -1) {
            cleanText = cleanText.substring(startIdx, endIdx + 1);
        }
        return JSON.parse(cleanText);
      } catch (error) {
        console.error("Original AI Response:", text);
        throw new Error("AI 回傳的格式無法被解析，請再點擊生成一次。");
      }
    };

    const callQwenAPI = async (apiKey, systemPrompt, userPrompt) => {
      try {
        const response = await fetch('https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions', {
          method: 'POST',
          headers: { 
            'Authorization': `Bearer ${apiKey.trim()}`, 
            'Content-Type': 'application/json' 
          },
          body: JSON.stringify({ 
            model: 'qwen-plus', 
            messages: [
              { role: 'system', content: systemPrompt }, 
              { role: 'user', content: userPrompt }
            ] 
          })
        });
        
        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error?.message || `API HTTP 錯誤代碼: ${response.status}`);
        }
        
        const data = await response.json();
        return extractJSON(data.choices[0].message.content);
      } catch (error) {
        if (error.message === "Failed to fetch") {
          throw new Error("網路連線失敗或跨域請求被阻擋，請確認金鑰是否正確。");
        }
        throw new Error(error.message);
      }
    };

    // --- Main App ---
    function App() {
      const [isDbReady, setIsDbReady] = useState(false);
      const [globalApiKey, setGlobalApiKey] = useState('');
      const [loggedInUser, setLoggedInUser] = useState(null); 
      const [allStudents, setAllStudents] = useState([]);
      
      const [loginUsername, setLoginUsername] = useState('');
      const [loginPassword, setLoginPassword] = useState('');

      const [currentView, setCurrentView] = useState('home');
      const [isLoading, setIsLoading] = useState(false);
      const [loadingText, setLoadingText] = useState('');
      const [errorMsg, setErrorMsg] = useState('');

      // Init & Auth
      useEffect(() => {
        const initApp = async () => {
          try {
            await signInAnonymously(auth);
            const adminRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', 'admin');
            const adminSnap = await getDoc(adminRef);
            if (!adminSnap.exists()) await setDoc(adminRef, { role: 'admin', password: '12345', name: '系統管理員' });

            const savedUsername = localStorage.getItem('math_logged_in_user');
            if (savedUsername) {
              const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', savedUsername);
              const userSnap = await getDoc(userRef);
              if (userSnap.exists()) {
                const uData = { username: savedUsername, ...userSnap.data() };
                setLoggedInUser(uData);
                setCurrentView(uData.role === 'admin' ? 'admin_students' : 'student_tasks');
              }
            }
            setIsDbReady(true);
          } catch (error) { setErrorMsg("系統連線失敗: " + error.message); }
        };
        initApp();
      }, []);

      // Data Sync
      useEffect(() => {
        const globalConfigRef = doc(db, 'artifacts', appId, 'public', 'data', 'systemConfig', 'keys');
        const unsubGlobal = onSnapshot(globalConfigRef, (docSnap) => setGlobalApiKey(docSnap.exists() ? docSnap.data().qwenApiKey : ''));

        let unsubUser = () => {};
        let unsubAdmin = () => {};

        if (loggedInUser) {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', loggedInUser.username);
          unsubUser = onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) setLoggedInUser(prev => ({ username: docSnap.id, ...prev, ...docSnap.data() }));
          });

          if (loggedInUser.role === 'admin') {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'accounts');
            unsubAdmin = onSnapshot(q, (snap) => {
              const list = [];
              snap.forEach(d => { if (d.data().role === 'student') list.push({ username: d.id, ...d.data() }); });
              setAllStudents(list);
            });
          }
        }
        return () => { unsubGlobal(); unsubUser(); unsubAdmin(); };
      }, [loggedInUser?.username, loggedInUser?.role]);

      // Actions
      const handleLogin = async (e) => {
        e.preventDefault();
        setIsLoading(true);
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', loginUsername);
          const snap = await getDoc(docRef);
          if (snap.exists() && snap.data().password === loginPassword) {
            const userData = { username: loginUsername, ...snap.data() };
            setLoggedInUser(userData);
            localStorage.setItem('math_logged_in_user', loginUsername);
            setCurrentView(userData.role === 'admin' ? 'admin_students' : 'student_tasks');
          } else { setErrorMsg('登入失敗：代號或密碼錯誤'); }
        } catch (err) { setErrorMsg('登入發生錯誤'); }
        setIsLoading(false);
      };

      const handleLogout = () => {
        setLoggedInUser(null);
        localStorage.removeItem('math_logged_in_user');
        setLoginUsername(''); setLoginPassword('');
      };

      const updateAccountDb = async (username, updates) => {
        try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'accounts', username), updates, { merge: true }); } 
        catch (e) { setErrorMsg("資料更新失敗"); throw e; }
      };

      const errorToastContent = errorMsg ? (
        <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-[100] bg-red-100 border-l-4 border-red-500 text-red-700 px-6 py-4 rounded shadow-lg flex items-center gap-3">
          <AlertCircle size={20} /><span className="font-medium">{errorMsg}</span>
          <button onClick={() => setErrorMsg('')} className="ml-4 text-red-500 hover:text-red-700 font-bold">✕</button>
        </div>
      ) : null;

      const renderLogin = () => (
        <div className="min-h-screen flex items-center justify-center bg-indigo-900 p-4">
          <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md animate-in fade-in zoom-in duration-300">
            <div className="flex flex-col items-center mb-8">
              <div className="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mb-4">
                <BrainCircuit size={32} />
              </div>
              <h1 className="text-2xl font-bold text-slate-800">AI 數學導師系統</h1>
              <p className="text-slate-500 text-sm mt-1">請輸入您的登入代號與密碼</p>
            </div>
            
            <form onSubmit={handleLogin} className="space-y-5">
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-2 flex items-center gap-2"><User size={16}/> 登入代號</label>
                <input 
                  type="text" 
                  value={loginUsername}
                  onChange={(e) => setLoginUsername(e.target.value)}
                  placeholder="例如: admin 或 student1"
                  className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition-all bg-slate-50"
                  required
                />
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-2 flex items-center gap-2"><Lock size={16}/> 密碼</label>
                <input 
                  type="password" 
                  value={loginPassword}
                  onChange={(e) => setLoginPassword(e.target.value)}
                  placeholder="請輸入密碼"
                  className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition-all bg-slate-50"
                  required
                />
              </div>
              <button 
                type="submit" 
                disabled={isLoading || !isDbReady}
                className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white rounded-xl font-bold text-lg shadow-md transition-all flex items-center justify-center gap-2 mt-4"
              >
                {isLoading ? <Loader2 size={20} className="animate-spin" /> : '登入'}
              </button>
            </form>
          </div>
        </div>
      );

      // ==========================================
      // Admin Views
      // ==========================================
      
      const AdminSettings = () => {
        const [tempApiKey, setTempApiKey] = useState(globalApiKey);
        const handleUpdateApiKey = async () => {
          try {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'systemConfig', 'keys'), { qwenApiKey: tempApiKey.trim() }, { merge: true });
            alert("全域 API Key 已更新！");
          } catch (e) { setErrorMsg("設定更新失敗"); }
        };

        return (
          <div className="max-w-2xl mx-auto space-y-6 animate-in fade-in">
            <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
              <h2 className="text-2xl font-bold mb-6 flex items-center gap-2"><Settings className="text-indigo-600"/> 系統設定</h2>
              <div className="space-y-4">
                <label className="block font-bold">全域 Qwen API Key (必需設定)</label>
                <div className="flex gap-2">
                  <input type="password" value={tempApiKey} onChange={e=>setTempApiKey(e.target.value)} placeholder="sk-xxxxxxxxxxxxxxxx" className="flex-1 px-4 py-3 rounded-xl border border-slate-300 outline-none"/>
                  <button onClick={handleUpdateApiKey} className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold">更新金鑰</button>
                </div>
                <p className="text-sm text-slate-500">此金鑰將用於生成所有題目及分析報告。設定後，所有學生將自動共用此金鑰。</p>
              </div>
            </div>
          </div>
        );
      };

      const AdminStudents = () => {
        const [nUser, setNUser] = useState(''); const [nPass, setNPass] = useState('');
        const [nName, setNName] = useState(''); const [nGrade, setNGrade] = useState('小四');

        const createStudent = async (e) => {
          e.preventDefault();
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', nUser);
          const snap = await getDoc(docRef);
          if (snap.exists()) return setErrorMsg("此代號已被使用！");
          await setDoc(docRef, { role: 'student', password: nPass, name: nName, grade: nGrade, abilityScore: 50, assignments: [], reports: [] });
          setNUser(''); setNPass(''); setNName('');
          alert("建立成功");
        };

        const resetPassword = async (username) => {
          const newPw = prompt(`請輸入學生 [${username}] 的新密碼：`);
          if(newPw) {
            try {
              await updateAccountDb(username, { password: newPw });
              alert(`學生 ${username} 密碼已成功更新！`);
            } catch (error) {
              alert("修改密碼失敗：" + error.message);
            }
          }
        };

        return (
          <div className="space-y-6 animate-in fade-in max-w-5xl mx-auto">
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
              <h2 className="text-xl font-bold flex items-center gap-2 mb-4"><UserPlus className="text-indigo-600"/> 新增學生</h2>
              <form onSubmit={createStudent} className="grid grid-cols-1 md:grid-cols-5 gap-4">
                <input placeholder="登入代號" value={nUser} onChange={e=>setNUser(e.target.value)} required className="border p-2 rounded"/>
                <input placeholder="密碼" value={nPass} onChange={e=>setNPass(e.target.value)} required className="border p-2 rounded"/>
                <input placeholder="姓名" value={nName} onChange={e=>setNName(e.target.value)} required className="border p-2 rounded"/>
                <select value={nGrade} onChange={e=>setNGrade(e.target.value)} className="border p-2 rounded">{GRADES.map(g=><option key={g}>{g}</option>)}</select>
                <button type="submit" className="bg-indigo-600 text-white rounded font-bold">建立</button>
              </form>
            </div>
            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
              <table className="w-full text-left">
                <thead className="bg-slate-50"><tr className="text-slate-500"><th className="p-4">代號</th><th className="p-4">姓名</th><th className="p-4">年級</th><th className="p-4">能力</th><th className="p-4">操作</th></tr></thead>
                <tbody>
                  {allStudents.map(s => (
                    <tr key={s.username} className="border-t hover:bg-slate-50">
                      <td className="p-4 font-medium">{s.username}</td><td className="p-4">{s.name}</td><td className="p-4">{s.grade}</td>
                      <td className="p-4"><span className="bg-green-100 text-green-700 px-2 py-1 rounded font-bold">{s.abilityScore||50}</span></td>
                      <td className="p-4">
                        <button onClick={()=>resetPassword(s.username)} className="text-indigo-600 hover:underline text-sm font-medium mr-4">修改密碼</button>
                        <button onClick={async ()=>{if(confirm('確定刪除？')) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'accounts', s.username));}} className="text-red-500 hover:underline text-sm">刪除</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      const AdminAssign = () => {
        const [targetGrade, setTargetGrade] = useState('小四');
        const [targetStudents, setTargetStudents] = useState([]);
        const [quizType, setQuizType] = useState('mc'); // mc, text, calc, paper
        const [numQuestions, setNumQuestions] = useState(3);
        const [topic, setTopic] = useState('');
        const [referenceText, setReferenceText] = useState('');
        
        // Reference File Upload State
        const [refFileUrl, setRefFileUrl] = useState('');
        const [refFileName, setRefFileName] = useState('');
        const [uploadingRef, setUploadingRef] = useState(false);
        
        const [draftQuestions, setDraftQuestions] = useState([]);

        const handleUploadRef = async (e) => {
          const file = e.target.files[0];
          if(!file) return;
          setUploadingRef(true);
          try {
            const storageRef = ref(storage, `artifacts/${appId}/references/${Date.now()}_${file.name}`);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            setRefFileUrl(url);
            setRefFileName(file.name);
          } catch(e) { setErrorMsg("檔案上傳失敗: " + e.message); }
          setUploadingRef(false);
        };

        const handleGenerateMore = async () => {
          if (!globalApiKey) return setErrorMsg("請確保系統設定中已輸入 API Key");
          if (!topic) return setErrorMsg("請輸入課題名稱");
          setIsLoading(true); setLoadingText('AI 正在出卷中...');

          if (quizType === 'paper') {
            setDraftQuestions([{ type: 'paper', question: '紙本練習（不需回答，請上傳檔案）' }]);
            setIsLoading(false); return;
          }

          let promptType = ""; let jsonFormat = "";
          if (quizType === 'mc') {
            promptType = "選擇題";
            jsonFormat = `{"questions": [{"type": "mc", "question": "題目", "options": ["A", "B", "C", "D"], "correctAnswer": "正確選項文字"}]}`;
          } else if (quizType === 'text') {
            promptType = "文字短答題";
            jsonFormat = `{"questions": [{"type": "text", "question": "題目", "correctAnswer": "標準答案"}]}`;
          } else if (quizType === 'calc') {
            promptType = "算式題";
            jsonFormat = `{"questions": [{"type": "calc", "question": "數學算式", "correctAnswer": "最終答案數值"}]}`;
          }

          const sys = `你是香港數學老師。依據 EDB 指引，以繁體中文出題。格式必須為嚴格 JSON: ${jsonFormat}。純文字數學符號(+, -, ×, ÷)。`;
          const usr = `請為${targetGrade}出 ${numQuestions} 題「${topic}」的${promptType}。${referenceText ? '參考內容：' + referenceText : ''}`;

          try {
            const res = await callQwenAPI(globalApiKey, sys, usr);
            
            // 安全處理陣列與物件格式
            const generatedArr = Array.isArray(res) ? res : (res.questions || []);
            if (generatedArr.length === 0) {
              throw new Error("AI 未能產生有效的題目格式，請再試一次。");
            }
            
            setDraftQuestions(prev => [...prev, ...generatedArr]);
          } catch(e) { 
            setErrorMsg("出題發生錯誤: " + e.message); 
          }
          setIsLoading(false);
        };

        const handleDistribute = async () => {
          if(targetStudents.length === 0) return setErrorMsg("請選擇至少一位學生");
          if(quizType !== 'paper' && draftQuestions.length === 0) return setErrorMsg("請至少生成一題或建立紙本任務");
          if(!topic) return setErrorMsg("請填寫課題名稱");

          const task = { 
            id: Date.now().toString(), 
            status: 'pending', 
            dateAssigned: new Date().toLocaleString('zh-HK'),
            type: quizType === 'paper' ? 'paper' : 'mixed',
            topic,
            instruction: referenceText || (quizType==='paper' ? '請完成指定功課並拍照上傳。' : ''),
            refFileUrl,
            refFileName,
            questions: draftQuestions
          };
          
          setIsLoading(true); setLoadingText('正在派發練習...');
          for (const u of targetStudents) {
            const sData = allStudents.find(s=>s.username === u);
            const newAssignments = [task, ...(sData.assignments || [])];
            await updateAccountDb(u, { assignments: newAssignments });
          }
          setIsLoading(false); alert("派發成功！"); 
          // Reset Draft
          setDraftQuestions([]); setTopic(''); setReferenceText(''); setRefFileUrl(''); setRefFileName('');
        };

        const updateQuestion = (idx, field, val) => {
          const newQ = [...draftQuestions];
          newQ[idx][field] = val;
          setDraftQuestions(newQ);
        };

        const removeQuestion = (idx) => {
          setDraftQuestions(draftQuestions.filter((_, i) => i !== idx));
        };

        return (
          <div className="max-w-5xl mx-auto space-y-6 animate-in fade-in">
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
              <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><Send className="text-indigo-600"/> 生成與派發練習</h2>
              
              <div className="grid grid-cols-2 gap-6 mb-6">
                <div>
                  <label className="block font-bold mb-2">1. 選擇派發對象</label>
                  <div className="border p-3 rounded-lg max-h-40 overflow-y-auto bg-slate-50">
                    {allStudents.map(s => (
                      <label key={s.username} className="flex items-center gap-2 mb-2">
                        <input type="checkbox" checked={targetStudents.includes(s.username)} onChange={(e)=>{
                          if(e.target.checked) setTargetStudents([...targetStudents, s.username]);
                          else setTargetStudents(targetStudents.filter(id=>id!==s.username));
                        }}/>
                        {s.name} ({s.grade})
                      </label>
                    ))}
                  </div>
                </div>
                <div className="space-y-4">
                  <div><label className="font-bold">2. 目標年級 (供 AI 參考)</label><select value={targetGrade} onChange={e=>setTargetGrade(e.target.value)} className="w-full border p-2 rounded">{GRADES.map(g=><option key={g}>{g}</option>)}</select></div>
                  <div className="flex gap-4">
                    <div className="flex-1">
                      <label className="font-bold">3. 練習題型</label>
                      <select value={quizType} onChange={e=>setQuizType(e.target.value)} className="w-full border p-2 rounded bg-white">
                        <option value="mc">選擇題 (自動批改)</option>
                        <option value="text">文字短答題</option>
                        <option value="calc">算式題</option>
                        <option value="paper">紙本練習 (上傳圖片)</option>
                      </select>
                    </div>
                    {quizType !== 'paper' && (
                      <div className="w-24">
                        <label className="font-bold">題數</label>
                        <input type="number" min="1" max="10" value={numQuestions} onChange={e=>setNumQuestions(parseInt(e.target.value)||1)} className="w-full border p-2 rounded"/>
                      </div>
                    )}
                  </div>
                </div>
              </div>

              <div className="mb-4">
                <label className="font-bold">4. 課題名稱</label>
                <input type="text" value={topic} onChange={e=>setTopic(e.target.value)} placeholder="例如：分數加減法" className="w-full border p-2 rounded"/>
              </div>

              <div className="mb-6 grid grid-cols-2 gap-4">
                <div>
                  <label className="font-bold">5. 參考教材 / 補充說明文字</label>
                  <textarea value={referenceText} onChange={e=>setReferenceText(e.target.value)} rows="3" placeholder="輸入文字供 AI 參考出題，或供學生參考" className="w-full border p-2 rounded mt-1"></textarea>
                </div>
                <div>
                  <label className="font-bold">6. 附加參考檔案 (供學生檢視，支援 PDF/JPG)</label>
                  <input type="file" onChange={handleUploadRef} accept=".pdf,image/*" className="w-full border p-2 rounded mt-1 bg-slate-50"/>
                  {uploadingRef && <span className="text-indigo-600 text-sm mt-1 block">上傳中...</span>}
                  {refFileUrl && <span className="text-green-600 text-sm font-bold mt-1 block">✅ 已附帶檔案：{refFileName}</span>}
                </div>
              </div>

              <button onClick={handleGenerateMore} className="w-full bg-slate-800 hover:bg-slate-900 text-white py-3 rounded-xl font-bold flex justify-center items-center gap-2">
                <PlusCircle size={20}/> 加入到草稿 ({quizType === 'paper' ? '紙本模板' : `${numQuestions} 題 ${quizType}`})
              </button>
            </div>

            {draftQuestions.length > 0 && (
              <div className="bg-white p-6 rounded-2xl shadow border border-indigo-200">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-xl font-bold">預覽與編輯草稿 (共 {draftQuestions.length} 題)</h3>
                  <button onClick={()=>setDraftQuestions([])} className="text-red-500 hover:underline text-sm font-medium">清空草稿</button>
                </div>
                
                {draftQuestions[0].type === 'paper' ? (
                  <div className="p-4 bg-yellow-50 text-yellow-800 rounded">紙本練習無需編輯題目，學生將直接看到指引並上傳檔案。</div>
                ) : (
                  <div className="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                    {draftQuestions.map((q, i) => (
                      <div key={i} className="p-4 border border-slate-200 rounded-xl bg-slate-50 relative">
                        <button onClick={() => removeQuestion(i)} className="absolute top-4 right-4 text-red-400 hover:text-red-600"><Trash2 size={18}/></button>
                        <div className="mb-2 w-11/12">
                          <label className="text-sm font-bold text-indigo-700">[{q.type === 'mc' ? '選擇題' : q.type === 'calc' ? '算式題' : '文字題'}] 題目 {i+1}</label>
                          <input value={q.question} onChange={e=>updateQuestion(i,'question',e.target.value)} className="w-full border p-2 rounded mt-1"/>
                        </div>
                        {q.type === 'mc' && (
                          <div className="mb-2"><label className="text-sm font-bold text-slate-600">選項 (用逗號分隔)</label><input value={(q.options||[]).join(',')} onChange={e=>updateQuestion(i,'options',e.target.value.split(','))} className="w-full border p-2 rounded mt-1"/></div>
                        )}
                        <div><label className="text-sm font-bold text-green-700">正確答案</label><input value={q.correctAnswer} onChange={e=>updateQuestion(i,'correctAnswer',e.target.value)} className="w-full border p-2 rounded bg-green-50 mt-1"/></div>
                      </div>
                    ))}
                  </div>
                )}
                <button onClick={handleDistribute} className="w-full mt-6 bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold text-lg shadow">確認無誤，立即派發給 {targetStudents.length} 位學生</button>
              </div>
            )}
          </div>
        );
      };

      const AdminReports = () => {
        const [selectedStudent, setSelectedStudent] = useState('');
        const [generatedReport, setGeneratedReport] = useState(null);

        const targetS = allStudents.find(s=>s.username === selectedStudent);

        const handleGenReport = async () => {
          if(!targetS) return;
          if(!globalApiKey) return setErrorMsg("請確保系統設定中已輸入 API Key");
          setIsLoading(true); setLoadingText('AI 正在深度分析學生數據...');
          
          const historyText = (targetS.assignments || []).filter(a=>a.status==='completed').map(a => `課題:${a.topic}, 得分:${a.score}, 耗時:${a.totalTime}秒`).join('; ');
          const sys = `你是香港數學教育專家，請根據學生的歷史表現數據，以繁體中文撰寫一份專業的綜合評估報告。返回JSON: {"summary":"整體評價", "strengths":["優勢1"], "weaknesses":["弱點1"], "advice":"具體建議"}`;
          const usr = `學生:${targetS.name}, 年級:${targetS.grade}, 歷史表現: ${historyText || '尚未有完成的練習'}`;
          
          try {
            const res = await callQwenAPI(globalApiKey, sys, usr);
            setGeneratedReport({ id: Date.now().toString(), date: new Date().toLocaleDateString('zh-HK'), ...res });
          } catch(e){ setErrorMsg(e.message); }
          setIsLoading(false);
        };

        const handleDistributeReport = async () => {
          const newReports = [generatedReport, ...(targetS.reports || [])];
          await updateAccountDb(targetS.username, { reports: newReports });
          alert('報告已派發給學生！');
        };

        const exportPDF = () => {
          const element = document.getElementById('report-pdf-content');
          html2pdf().from(element).set({ margin: 10, filename: `${targetS.name}_數學能力報告.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).save();
        };

        return (
          <div className="max-w-4xl mx-auto space-y-6 animate-in fade-in">
            <div className="bg-white p-6 rounded-2xl shadow border border-slate-100">
              <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><BarChart2 className="text-indigo-600"/> 學生能力分析與報告</h2>
              <select value={selectedStudent} onChange={e=>{setSelectedStudent(e.target.value); setGeneratedReport(null);}} className="w-full border p-3 rounded-xl bg-slate-50 font-medium mb-4">
                <option value="">-- 請選擇學生 --</option>
                {allStudents.map(s => <option key={s.username} value={s.username}>{s.name} ({s.grade})</option>)}
              </select>
              {targetS && (
                <div className="flex justify-between items-center bg-indigo-50 p-4 rounded-xl">
                  <div><p className="font-bold text-indigo-900">{targetS.name}</p><p className="text-sm text-indigo-700">已完成 {(targetS.assignments||[]).filter(a=>a.status==='completed').length} 份練習</p></div>
                  <button onClick={handleGenReport} className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold">生成 AI 分析報告</button>
                </div>
              )}
            </div>

            {generatedReport && (
              <div className="space-y-4">
                <div id="report-pdf-content" className="print-container rounded-2xl shadow border border-slate-200">
                  <div className="text-center border-b pb-4 mb-6">
                    <h1 className="text-3xl font-black text-slate-800">數學能力綜合評估報告</h1>
                    <p className="text-slate-500 mt-2">學生：{targetS.name} | 年級：{targetS.grade} | 日期：{generatedReport.date}</p>
                  </div>
                  <div className="space-y-6">
                    <div><h3 className="text-xl font-bold text-indigo-800 mb-2 border-l-4 border-indigo-600 pl-3">整體表現</h3><p className="text-slate-700 leading-relaxed bg-slate-50 p-4 rounded">{generatedReport.summary}</p></div>
                    <div className="grid grid-cols-2 gap-6">
                      <div><h3 className="text-lg font-bold text-green-700 mb-2">掌握優勢</h3><ul className="list-disc pl-5 text-slate-700 space-y-1">{generatedReport.strengths.map((s,i)=><li key={i}>{s}</li>)}</ul></div>
                      <div><h3 className="text-lg font-bold text-orange-700 mb-2">需加強領域</h3><ul className="list-disc pl-5 text-slate-700 space-y-1">{generatedReport.weaknesses.map((s,i)=><li key={i}>{s}</li>)}</ul></div>
                    </div>
                    <div><h3 className="text-xl font-bold text-blue-800 mb-2 border-l-4 border-blue-600 pl-3">導師建議</h3><p className="text-slate-700 leading-relaxed bg-blue-50 p-4 rounded">{generatedReport.advice}</p></div>
                  </div>
                </div>
                <div className="flex gap-4">
                  <button onClick={handleDistributeReport} className="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold flex justify-center items-center gap-2"><Send size={20}/> 派發給學生</button>
                  <button onClick={exportPDF} className="flex-1 bg-slate-800 text-white py-3 rounded-xl font-bold flex justify-center items-center gap-2"><Download size={20}/> 匯出 PDF 檔案</button>
                </div>
              </div>
            )}
          </div>
        );
      };

      // ==========================================
      // Student Views
      // ==========================================

      const StudentTasks = () => {
        const [activeTask, setActiveTask] = useState(null);
        const [answers, setAnswers] = useState({});
        const [qIndex, setQIndex] = useState(0);
        
        const [taskStartTime, setTaskStartTime] = useState(0);
        const [qStartTime, setQStartTime] = useState(0);
        const [timeSpent, setTimeSpent] = useState({});
        const [uploading, setUploading] = useState(false);

        const assignments = loggedInUser.assignments || [];
        const pending = assignments.filter(a => a.status === 'pending');
        const completed = assignments.filter(a => a.status === 'completed');

        const startTask = (task) => {
          setActiveTask(task); setAnswers({}); setQIndex(0); setTimeSpent({});
          const now = Date.now(); setTaskStartTime(now); setQStartTime(now);
        };

        const nextQuestion = () => {
          const now = Date.now();
          const spent = Math.floor((now - qStartTime) / 1000);
          setTimeSpent(prev => ({...prev, [qIndex]: (prev[qIndex]||0) + spent}));
          setQIndex(qIndex + 1);
          setQStartTime(now);
        };

        const handleUpload = async (e) => {
          const file = e.target.files[0];
          if(!file) return;
          setUploading(true);
          try {
            const storageRef = ref(storage, `artifacts/${appId}/homeworks/${loggedInUser.username}_${Date.now()}_${file.name}`);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            setAnswers({0: url});
          } catch(e) { setErrorMsg("上傳失敗: " + e.message); }
          setUploading(false);
        };

        const submitTask = async () => {
          setIsLoading(true); setLoadingText('正在提交答案...');
          const spent = Math.floor((Date.now() - qStartTime) / 1000);
          const finalTimes = {...timeSpent, [qIndex]: (timeSpent[qIndex]||0) + spent};
          const totalTime = Object.values(finalTimes).reduce((a,b)=>a+b, 0);

          let score = 0;
          let details = [];

          if (activeTask.type === 'paper') {
            details = [{ question: '上傳功課', answer: answers[0] || '未上傳', time: totalTime }];
            score = '待批改';
          } else {
            let correctCount = 0;
            details = activeTask.questions.map((q, i) => {
              const isC = answers[i] === q.correctAnswer;
              if(isC) correctCount++;
              return { question: q.question, type: q.type, studentAnswer: answers[i]||'未作答', correctAnswer: q.correctAnswer, isCorrect: isC, time: finalTimes[i]||0 };
            });
            score = Math.round((correctCount / activeTask.questions.length) * 100);
          }

          const completedTask = { ...activeTask, status: 'completed', score, details, totalTime, dateCompleted: new Date().toLocaleString('zh-HK') };
          const updatedAssignments = assignments.map(a => a.id === activeTask.id ? completedTask : a);
          
          await updateAccountDb(loggedInUser.username, { assignments: updatedAssignments });
          setIsLoading(false); setActiveTask(null); alert("提交成功！");
        };

        if (activeTask) {
          const isPaper = activeTask.type === 'paper';
          const q = isPaper ? null : activeTask.questions[qIndex];

          return (
            <div className="max-w-3xl mx-auto bg-white rounded-2xl shadow border border-slate-100 overflow-hidden">
              <div className="bg-indigo-50 p-6 border-b border-indigo-100 flex justify-between items-center">
                <div><span className="bg-indigo-600 text-white px-3 py-1 rounded-full text-sm font-bold">{isPaper ? '紙本練習' : '電子練習'}</span><span className="ml-3 font-bold text-indigo-900">{activeTask.topic}</span></div>
                {!isPaper && <div className="text-indigo-600 font-bold">第 {qIndex + 1} / {activeTask.questions.length} 題</div>}
              </div>

              <div className="p-8">
                {activeTask.refFileUrl && (
                  <div className="mb-6 p-4 bg-blue-50 border border-blue-200 rounded-xl">
                    <p className="text-sm font-bold text-blue-800 mb-2">老師附帶的參考檔案：</p>
                    <a href={activeTask.refFileUrl} target="_blank" className="flex items-center gap-2 text-indigo-600 font-bold hover:underline"><FileText size={20}/> 點擊開啟 {activeTask.refFileName}</a>
                  </div>
                )}

                {isPaper ? (
                  <div className="text-center py-10">
                    <h3 className="text-xl font-bold mb-4">{activeTask.instruction || '請完成指定功課並上傳'}</h3>
                    <div className="border-4 border-dashed border-slate-200 p-10 rounded-xl bg-slate-50">
                      {answers[0] ? (
                        <div className="text-green-600 font-bold flex flex-col items-center gap-2"><CheckCircle size={48}/> 檔案已上傳成功</div>
                      ) : (
                        <label className="cursor-pointer flex flex-col items-center gap-4 text-slate-500 hover:text-indigo-600">
                          {uploading ? <Loader2 size={48} className="animate-spin"/> : <FileUp size={48}/>}
                          <span className="font-bold text-lg">{uploading ? '上傳中...' : '點擊選擇相片或檔案上傳'}</span>
                          <input type="file" onChange={handleUpload} className="hidden" accept="image/*,.pdf"/>
                        </label>
                      )}
                    </div>
                  </div>
                ) : (
                  <div>
                    <h3 className="text-2xl font-bold mb-8">{formatMathText(q.question)}</h3>
                    {q.type === 'mc' ? (
                      <div className="space-y-4">
                        {q.options.map((opt, i) => (
                          <label key={i} className={`flex items-center p-4 rounded-xl border-2 cursor-pointer ${answers[qIndex] === opt ? 'border-indigo-600 bg-indigo-50' : 'border-slate-200'}`}>
                            <input type="radio" name="mc" checked={answers[qIndex] === opt} onChange={()=>setAnswers({...answers, [qIndex]: opt})} className="hidden"/>
                            <div className={`w-6 h-6 rounded-full border-2 mr-4 flex items-center justify-center ${answers[qIndex]===opt?'border-indigo-600':'border-slate-300'}`}>{answers[qIndex]===opt && <div className="w-3 h-3 bg-indigo-600 rounded-full"></div>}</div>
                            <span className="text-lg">{formatMathText(opt)}</span>
                          </label>
                        ))}
                      </div>
                    ) : (
                      <input type="text" placeholder="請輸入答案" value={answers[qIndex]||''} onChange={e=>setAnswers({...answers, [qIndex]: e.target.value})} className="w-full text-xl p-4 border-2 border-slate-200 rounded-xl focus:border-indigo-600 outline-none"/>
                    )}
                  </div>
                )}
              </div>

              <div className="p-6 bg-slate-50 flex justify-end">
                {(!isPaper && qIndex < activeTask.questions.length - 1) ? (
                  <button onClick={nextQuestion} disabled={!answers[qIndex]} className="bg-indigo-600 disabled:bg-slate-300 text-white px-8 py-3 rounded-xl font-bold">下一題</button>
                ) : (
                  <button onClick={submitTask} disabled={!answers[isPaper?0:qIndex]} className="bg-green-600 disabled:bg-slate-300 text-white px-8 py-3 rounded-xl font-bold">正式提交</button>
                )}
              </div>
            </div>
          );
        }

        return (
          <div className="max-w-5xl mx-auto space-y-8 animate-in fade-in">
            <h2 className="text-2xl font-bold flex items-center gap-2"><Edit3 className="text-indigo-600"/> 待處理任務</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {pending.length === 0 ? <p className="text-slate-500">目前沒有待辦練習。</p> : pending.map(t => (
                <div key={t.id} className="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-indigo-500 flex justify-between items-center">
                  <div><span className="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded font-bold">{t.type==='paper'?'紙本':'電子'}</span><h3 className="font-bold text-lg mt-2">{t.topic}</h3><p className="text-sm text-slate-500">{t.dateAssigned} 派發</p></div>
                  <button onClick={()=>startTask(t)} className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold shadow hover:bg-indigo-700">開始</button>
                </div>
              ))}
            </div>

            <h2 className="text-2xl font-bold mt-12 mb-4">已完成任務</h2>
            <div className="space-y-4">
              {completed.length === 0 ? <p className="text-slate-500">尚未完成任何練習。</p> : completed.map(t => (
                <div key={t.id} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                  <div><h3 className="font-bold text-lg text-slate-700">{t.topic}</h3><p className="text-sm text-slate-500">完成於 {t.dateCompleted} | 總耗時 {t.totalTime} 秒</p></div>
                  <div className="text-2xl font-black text-indigo-600">{t.score} {t.score!=='待批改' && '分'}</div>
                </div>
              ))}
            </div>
          </div>
        );
      };

      const StudentReports = () => {
        const reports = loggedInUser.reports || [];
        return (
          <div className="max-w-4xl mx-auto space-y-6 animate-in fade-in">
            <h2 className="text-2xl font-bold flex items-center gap-2 mb-6"><FileText className="text-indigo-600"/> 導師分析報告</h2>
            {reports.length === 0 ? <p className="text-slate-500">尚未收到任何報告。</p> : reports.map(r => (
              <div key={r.id} className="bg-white p-8 rounded-2xl shadow border border-slate-200">
                <div className="mb-4 pb-4 border-b flex justify-between items-end">
                  <h3 className="text-2xl font-black text-slate-800">數學能力綜合評估</h3><span className="text-slate-500">{r.date}</span>
                </div>
                <p className="bg-slate-50 p-4 rounded text-slate-700 font-medium mb-4">{r.summary}</p>
                <div className="grid grid-cols-2 gap-4 mb-4">
                  <div className="bg-green-50 p-4 rounded"><h4 className="font-bold text-green-800 mb-2">掌握優勢</h4><ul className="list-disc pl-4 text-sm text-green-700">{r.strengths.map((s,i)=><li key={i}>{s}</li>)}</ul></div>
                  <div className="bg-orange-50 p-4 rounded"><h4 className="font-bold text-orange-800 mb-2">需加強領域</h4><ul className="list-disc pl-4 text-sm text-orange-700">{r.weaknesses.map((s,i)=><li key={i}>{s}</li>)}</ul></div>
                </div>
                <div className="bg-indigo-50 p-4 rounded"><h4 className="font-bold text-indigo-800 mb-2">導師建議</h4><p className="text-sm text-indigo-700">{r.advice}</p></div>
              </div>
            ))}
          </div>
        );
      };

      // --- Main Render ---
      if (!loggedInUser) return <>{errorToastContent}{renderLogin()}</>;

      const isAdmin = loggedInUser.role === 'admin';
      const navItems = isAdmin 
        ? [ { id: 'admin_students', icon: Users, label: '學生管理' }, { id: 'admin_assign', icon: Send, label: '派發練習' }, { id: 'admin_reports', icon: BarChart2, label: '分析與報告' }, { id: 'admin_settings', icon: Settings, label: '系統設定' } ]
        : [ { id: 'student_tasks', icon: Edit3, label: '我的任務' }, { id: 'student_reports', icon: FileText, label: '我的報告' } ];

      return (
        <div className="flex min-h-screen">
          {errorToastContent}
          <div className="w-64 bg-indigo-900 text-white min-h-screen p-6 flex flex-col shadow-xl hidden md:flex fixed top-0 left-0 h-full z-10">
            <div className="flex items-center gap-3 mb-8"><BrainCircuit size={32} className="text-indigo-300" /><h1 className="text-xl font-bold tracking-wider">AI 數學系統</h1></div>
            <nav className="flex-1 space-y-2">
              {navItems.map(item => <button key={item.id} onClick={() => setCurrentView(item.id)} className={`flex items-center gap-3 w-full p-3 rounded-lg transition-colors ${currentView === item.id ? 'bg-indigo-700 text-white font-medium' : 'text-indigo-200 hover:bg-indigo-800'}`}><item.icon size={20} /><span>{item.label}</span></button>)}
            </nav>
            <div className="mt-auto pt-6 border-t border-indigo-700">
              <div className="flex justify-between mb-2"><span className="text-sm text-indigo-200">{isAdmin ? '管理員' : '學生'}</span><button onClick={handleLogout}><LogOut size={18}/></button></div>
              <div className="font-bold text-lg">{loggedInUser.name}</div>
            </div>
          </div>

          {/* Mobile Nav */}
          <div className="md:hidden fixed top-0 w-full bg-indigo-900 text-white p-4 flex justify-between items-center z-40 shadow-md">
            <div className="font-bold">AI 數學</div>
            <div className="flex gap-4">{navItems.map(item => <button key={item.id} onClick={() => setCurrentView(item.id)}><item.icon size={20}/></button>)}<button onClick={handleLogout}><LogOut size={20}/></button></div>
          </div>

          <main className="flex-1 p-6 md:p-10 pt-20 md:pt-10 h-screen overflow-y-auto relative md:ml-64 bg-slate-50">
            {isLoading && <div className="absolute inset-0 z-50 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center"><Loader2 size={48} className="text-indigo-600 animate-spin mb-4" /><p className="font-medium text-slate-700">{loadingText}</p></div>}
            {currentView === 'admin_settings' && isAdmin && <AdminSettings />}
            {currentView === 'admin_students' && isAdmin && <AdminStudents />}
            {currentView === 'admin_assign' && isAdmin && <AdminAssign />}
            {currentView === 'admin_reports' && isAdmin && <AdminReports />}
            {currentView === 'student_tasks' && !isAdmin && <StudentTasks />}
            {currentView === 'student_reports' && !isAdmin && <StudentReports />}
          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
