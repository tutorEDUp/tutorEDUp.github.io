<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 數學導師</title>
  <!-- 載入 Tailwind CSS (排版樣式) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 載入 Babel (讓瀏覽器能讀懂 React JSX 語法) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* 隱藏未編譯前的閃爍 */
    body { margin: 0; padding: 0; font-family: sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="root"></div>

  <!-- 應用程式邏輯 -->
  <script type="text/babel" data-type="module">
    // --- 1. 從 CDN 載入 React 與依賴套件 ---
    import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      BookOpen, BrainCircuit, BarChart2, Settings, 
      ChevronRight, CheckCircle, XCircle, Award, 
      AlertCircle, Loader2, PlayCircle, Clock, PartyPopper,
      Users, UserPlus, Cloud, CloudOff, Info,
      BookmarkX, Target, PenTool, Trash2, LogOut, Lock, User
    } from 'https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0';

    // --- 2. 從 CDN 載入 Firebase (使用 ES Module) ---
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
    import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    // --- 3. Firebase 初始化 (您的專屬設定) ---
    const firebaseConfig = {
      apiKey: "AIzaSyBmSOc6Xbnqhe9FVQS2SjFhWpXq75iSBX8",
      authDomain: "ai-math-system-c239f.firebaseapp.com",
      projectId: "ai-math-system-c239f",
      storageBucket: "ai-math-system-c239f.firebasestorage.app",
      messagingSenderId: "854186745107",
      appId: "1:854186745107:web:64227aad20bcbba29d8ee6",
      measurementId: "G-RX0ZQ3J3LW"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let analytics;
    if (typeof window !== 'undefined') analytics = getAnalytics(app);

    const appId = 'ai-math-system-c239f'; 

    // --- 4. 系統常數與工具函數 ---
    const GRADES = ['小一', '小二', '小三', '小四', '小五', '小六', '中一', '中二', '中三', '中四', '中五', '中六'];

    const formatMathText = (text) => {
      if (typeof text !== 'string') return text;
      return text
        .replace(/\\times/g, ' × ')
        .replace(/\\div/g, ' ÷ ')
        .replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, '$1/$2')
        .replace(/\\circ/g, '°')
        .replace(/\\pi/g, 'π')
        .replace(/\\leq/g, '≤')
        .replace(/\\geq/g, '≥')
        .replace(/\\neq/g, '≠')
        .replace(/\\approx/g, '≈')
        .replace(/\^2/g, '²')
        .replace(/\^3/g, '³')
        .replace(/\\sqrt\{([^}]+)\}/g, '√($1)')
        .replace(/\$|\\\(|\\\)/g, '');
    };

    const extractJSON = (text) => {
      try {
        const match = text.match(/\{[\s\S]*\}|\[[\s\S]*\]/);
        if (match) return JSON.parse(match[0]);
        return JSON.parse(text);
      } catch (error) {
        throw new Error("AI 回應格式錯誤，請重試。");
      }
    };

    const callQwenAPI = async (apiKey, systemPrompt, userPrompt) => {
      const url = 'https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions';
      const response = await fetch(url, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${apiKey}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          model: 'qwen-plus',
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: userPrompt }
          ]
        })
      });
      if (!response.ok) {
        const errorData = await response.json();
        throw new Error(errorData.error?.message || "API 請求失敗");
      }
      const data = await response.json();
      return extractJSON(data.choices[0].message.content);
    };

    // 新增：將 RadarChart 移至 App 外部以避免重複渲染及 Hook 報錯問題
    const RadarChart = ({ data }) => {
        if(data.length < 3) return <div className="text-slate-500 text-center py-10 bg-slate-50 rounded-xl border border-slate-100">完成更多不同課題的練習後即可生成雷達圖。</div>;
        const size = 320, center = size / 2, radius = 100;
        const getPoint = (val, i) => {
            const angle = (Math.PI * 2 * i) / data.length - Math.PI / 2;
            return { x: center + radius * val * Math.cos(angle), y: center + radius * val * Math.sin(angle) };
        };
        const pathData = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${getPoint(d.value, i).x} ${getPoint(d.value, i).y}`).join(' ') + ' Z';
        return (
            <svg width="100%" height={size} viewBox={`0 0 ${size} ${size}`} className="mx-auto max-w-sm">
                {[0.2, 0.4, 0.6, 0.8, 1].map((val, idx) => <polygon key={idx} points={data.map((_, i) => `${getPoint(val, i).x},${getPoint(val, i).y}`).join(' ')} fill="none" stroke="#e2e8f0" />)}
                {data.map((_, i) => <line key={i} x1={center} y1={center} x2={getPoint(1, i).x} y2={getPoint(1, i).y} stroke="#e2e8f0" />)}
                <polygon points={pathData} fill="rgba(79, 70, 229, 0.2)" stroke="#4f46e5" strokeWidth="2" />
                {data.map((d, i) => <circle key={`c${i}`} cx={getPoint(d.value, i).x} cy={getPoint(d.value, i).y} r="4" fill="#4f46e5" />)}
                {data.map((d, i) => <text key={`t${i}`} x={getPoint(1.25, i).x} y={getPoint(1.25, i).y} textAnchor="middle" dominantBaseline="middle" fontSize="12" fill="#475569" className="font-bold">{d.axis} ({d.label})</text>)}
            </svg>
        );
    };

    // --- 5. 主程式 ---
    function App() {
      // 系統與驗證狀態
      const [isDbReady, setIsDbReady] = useState(false);
      const [globalApiKey, setGlobalApiKey] = useState('');
      const [loggedInUser, setLoggedInUser] = useState(null); // 儲存登入帳戶的完整資料
      const [allStudents, setAllStudents] = useState([]); // 給 Admin 用的學生列表
      
      // 登入畫面狀態
      const [loginUsername, setLoginUsername] = useState('');
      const [loginPassword, setLoginPassword] = useState('');

      // 視圖與測驗狀態
      const [currentView, setCurrentView] = useState('home');
      const [quizMode, setQuizMode] = useState('');
      const [quizData, setQuizData] = useState(null);
      const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
      const [userAnswers, setUserAnswers] = useState({});
      const [isLoading, setIsLoading] = useState(false);
      const [loadingText, setLoadingText] = useState('');
      const [currentReport, setCurrentReport] = useState(null);
      const [errorMsg, setErrorMsg] = useState('');

      // 新增：將所有子視圖的 useState 移至 App 頂層，解決 React Error #310 錯誤
      // 管理員後台狀態
      const [newUsername, setNewUsername] = useState('');
      const [newPassword, setNewPassword] = useState('');
      const [newName, setNewName] = useState('');
      const [newGrade, setNewGrade] = useState('小四');
      const [newAge, setNewAge] = useState(9);
      
      // 設定畫面狀態
      const [tempPassword, setTempPassword] = useState('');
      const [tempApiKey, setTempApiKey] = useState('');

      // --- 初始化系統與登入邏輯 ---
      useEffect(() => {
        const initApp = async () => {
          try {
            await signInAnonymously(auth); // 取得雲端存取權限
            
            // 檢查並建立預設 Admin 帳號
            const adminRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', 'admin');
            const adminSnap = await getDoc(adminRef);
            if (!adminSnap.exists()) {
              await setDoc(adminRef, { role: 'admin', password: '12345', name: '系統管理員' });
            }

            // 檢查是否已有登入紀錄 (自動登入)
            const savedUsername = localStorage.getItem('math_logged_in_user');
            if (savedUsername) {
              const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', savedUsername);
              const userSnap = await getDoc(userRef);
              if (userSnap.exists()) {
                const uData = { username: savedUsername, ...userSnap.data() };
                setLoggedInUser(uData);
                setCurrentView(uData.role === 'admin' ? 'admin_students' : 'home');
              } else {
                localStorage.removeItem('math_logged_in_user');
              }
            }
            setIsDbReady(true);
          } catch (error) {
            setErrorMsg("系統連線失敗: " + error.message);
          }
        };
        initApp();
      }, []);

      // --- 監聽雲端資料變化 (Global Key & 帳號資料) ---
      useEffect(() => {
        // 監聽全域 API Key
        const globalConfigRef = doc(db, 'artifacts', appId, 'public', 'data', 'systemConfig', 'keys');
        const unsubGlobal = onSnapshot(globalConfigRef, (docSnap) => {
          if (docSnap.exists() && docSnap.data().qwenApiKey) {
            setGlobalApiKey(docSnap.data().qwenApiKey);
          } else {
            setGlobalApiKey('');
          }
        });

        let unsubUser = () => {};
        let unsubAdmin = () => {};

        if (loggedInUser) {
          if (loggedInUser.role === 'student') {
            // 學生即時監聽自己的資料
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', loggedInUser.username);
            unsubUser = onSnapshot(docRef, (docSnap) => {
              if (docSnap.exists()) {
                setLoggedInUser(prev => ({ username: docSnap.id, ...prev, ...docSnap.data() }));
              }
            });
          } else if (loggedInUser.role === 'admin') {
            // 管理員即時監聽所有學生資料
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'accounts');
            unsubAdmin = onSnapshot(q, (snap) => {
              const list = [];
              snap.forEach(d => {
                if (d.data().role === 'student') list.push({ username: d.id, ...d.data() });
              });
              setAllStudents(list);
            });
            // Admin 同時也要監聽自己的資料（例如改密碼）
            const adminRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', 'admin');
            unsubUser = onSnapshot(adminRef, (docSnap) => {
              if (docSnap.exists()) {
                setLoggedInUser(prev => ({ username: docSnap.id, ...prev, ...docSnap.data() }));
              }
            });
          }
        }

        return () => {
          unsubGlobal();
          unsubUser();
          unsubAdmin();
        };
      }, [loggedInUser?.username, loggedInUser?.role]);

      // 新增：當登入使用者變更時，同步設定畫面的密碼與金鑰
      useEffect(() => {
        if (loggedInUser) {
          setTempPassword(loggedInUser.password || '');
        }
      }, [loggedInUser?.password]);

      useEffect(() => {
        setTempApiKey(globalApiKey || '');
      }, [globalApiKey]);

      // --- 登入與登出操作 ---
      const handleLogin = async (e) => {
        e.preventDefault();
        if (!loginUsername || !loginPassword) return;
        setIsLoading(true);
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', loginUsername);
          const snap = await getDoc(docRef);
          if (snap.exists() && snap.data().password === loginPassword) {
            const userData = { username: loginUsername, ...snap.data() };
            setLoggedInUser(userData);
            localStorage.setItem('math_logged_in_user', loginUsername);
            setCurrentView(userData.role === 'admin' ? 'admin_students' : 'home');
          } else {
            setErrorMsg('登入失敗：代號或密碼錯誤');
          }
        } catch (err) {
          setErrorMsg('登入發生錯誤：' + err.message);
        }
        setIsLoading(false);
      };

      const handleLogout = () => {
        setLoggedInUser(null);
        localStorage.removeItem('math_logged_in_user');
        setLoginUsername('');
        setLoginPassword('');
      };

      const updateAccountInDb = async (username, updates) => {
        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'accounts', username), updates, { merge: true });
        } catch (e) { setErrorMsg("資料更新失敗"); }
      };

      const updateGlobalConfig = async (updates) => {
        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'systemConfig', 'keys'), updates, { merge: true });
        } catch (e) { setErrorMsg("全域設定更新失敗"); }
      };

      const toggleOverride = async (detailIndex) => {
        if (!currentReport || !loggedInUser) return;
        const newDetails = [...currentReport.details];
        newDetails[detailIndex].isCorrect = !newDetails[detailIndex].isCorrect;

        const newCorrectCount = newDetails.filter(d => d.isCorrect).length;
        const newScore = Math.round((newCorrectCount / currentReport.totalQuestions) * 100);

        const updatedReport = {
          ...currentReport,
          details: newDetails,
          correctCount: newCorrectCount,
          score: newScore
        };

        setCurrentReport(updatedReport);
        const updatedHistory = (loggedInUser.history || []).map(r => r.id === updatedReport.id ? updatedReport : r);
        await updateAccountInDb(loggedInUser.username, { history: updatedHistory });
      };

      // 修正：將 ErrorToast 改為純變數元件，避免子視圖產生元件混淆
      const errorToastContent = errorMsg ? (
        <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-[100] bg-red-100 border-l-4 border-red-500 text-red-700 px-6 py-4 rounded shadow-lg flex items-center gap-3">
          <AlertCircle size={20} />
          <span className="font-medium">{errorMsg}</span>
          <button onClick={() => setErrorMsg('')} className="ml-4 text-red-500 hover:text-red-700 font-bold">✕</button>
        </div>
      ) : null;

      // --- AI 測驗核心邏輯 ---
      const generateQuestions = async (mode) => {
        if (!globalApiKey) {
          setErrorMsg("系統尚未設定 Qwen API Key，請聯繫管理員。");
          return;
        }

        setIsLoading(true);
        setLoadingText('AI 正在為您度身訂造數學題...');
        setQuizMode(mode);

        const systemPrompt = `你是一位專業的香港數學老師，嚴格遵照香港教育局(EDB)的數學課程指引。
請使用香港慣用的數學名詞（如：立體圖形、分數、小數、代數式等），並以繁體中文(zh-HK)輸出。
【重要格式警告】：數學符號請務必使用純文字 Unicode (例如 ×, ÷, a/b, °, ²)，絕對禁止使用 LaTeX 語法 (如 \\times, \\frac, ^\\circ)。
你必須只回傳合法的 JSON 格式，不要包含任何 markdown 標記或其他文字。`;

        const userPrompt = `
請為一位${loggedInUser.grade}（${loggedInUser.age}歲）的學生生成 10 條數學選擇題。
目前的學習能力指數為：${loggedInUser.abilityScore || 50}/100。
模式：${mode === 'assessment' ? '能力檢測（包含容易、中等、困難題目以測量真實水平）' : '定期練習（根據目前能力指數出題，針對弱點進行強化）'}。

請以嚴格的 JSON 格式回傳，格式如下：
{
  "questions": [
    {
      "id": 1,
      "topic": "課題名稱",
      "question": "題目內容",
      "options": ["選項A", "選項B", "選項C", "選項D"],
      "correctAnswer": "正確答案 (必須與選項完全一致)",
      "explanation": "詳細的解題步驟與原理解釋"
    }
  ]
}`;

        try {
          const data = await callQwenAPI(globalApiKey, systemPrompt, userPrompt);
          if (data && data.questions && data.questions.length > 0) {
            setQuizData(data.questions);
            setUserAnswers({});
            setCurrentQuestionIndex(0);
            setCurrentView('quiz');
          } else {
            throw new Error("生成的題目格式不符");
          }
        } catch (error) {
          setErrorMsg("生成題目時發生錯誤: " + error.message);
        } finally {
          setIsLoading(false);
        }
      };

      const submitQuiz = async () => {
        setIsLoading(true);
        setLoadingText('AI 正在批改試卷並生成雲端分析報告...');

        let correctCount = 0;
        const details = quizData.map((q, index) => {
          const isCorrect = userAnswers[index] === q.correctAnswer;
          if (isCorrect) correctCount++;
          return {
            topic: q.topic,
            question: q.question,
            studentAnswer: userAnswers[index] || '未作答',
            correctAnswer: q.correctAnswer,
            isCorrect: isCorrect
          };
        });
        
        const score = (correctCount / quizData.length) * 100;
        const wrongAnswersContext = details.filter(d => !d.isCorrect).map(d => `課題：${d.topic} | 題目：${d.question}`).join('；');

        const systemPrompt = `你是一位專業的香港數學評估專家。請根據學生的作答結果提供深入分析及更新能力指數。請嚴格輸出 JSON 格式，使用繁體中文。數學符號請使用純文本。`;
        const userPrompt = `
學生年級：${loggedInUser.grade}
原能力指數：${loggedInUser.abilityScore || 50}/100
本次練習模式：${quizMode === 'assessment' ? '能力檢測' : '定期練習'}
本次得分：${correctCount}/${quizData.length} (${score}分)
答錯題目及課題：${wrongAnswersContext || '全對，無答錯題目'}

請生成評估報告，並重新評估該學生的「最新能力指數」(1-100)。JSON格式：
{
  "evaluation": "整體表現評價 (約 50 字)",
  "strengths": ["強項課題1"],
  "weaknesses": ["需改善課題1"],
  "suggestions": ["具體溫習建議1"],
  "newAbilityScore": 數值 (1-100)
}`;

        try {
          const reportData = await callQwenAPI(globalApiKey, systemPrompt, userPrompt);
          
          let finalAbilityScore = reportData.newAbilityScore;
          let leveledUp = false;
          let newGrade = loggedInUser.grade;

          if (finalAbilityScore >= 100) {
            const currentIndex = GRADES.indexOf(loggedInUser.grade);
            if (currentIndex !== -1 && currentIndex < GRADES.length - 1) {
              newGrade = GRADES[currentIndex + 1];
              finalAbilityScore = 50; 
              leveledUp = true;
            } else {
              finalAbilityScore = 100;
            }
          }

          const reportId = Date.now().toString();

          const fullReport = {
            id: reportId,
            date: new Date().toLocaleString('zh-HK'),
            mode: quizMode,
            score: score,
            correctCount,
            totalQuestions: quizData.length,
            details: details,
            analysis: { ...reportData, newAbilityScore: finalAbilityScore },
            leveledUp: leveledUp,
            oldGrade: loggedInUser.grade,
            newGrade: newGrade
          };

          await updateAccountInDb(loggedInUser.username, {
            grade: newGrade,
            abilityScore: finalAbilityScore,
            hasInitialAssessment: true,
            history: [fullReport, ...(loggedInUser.history || [])]
          });

          setCurrentReport(fullReport);
          setCurrentView('report');

        } catch (error) {
          setErrorMsg("生成報告時發生錯誤: " + error.message);
        } finally {
          setIsLoading(false);
        }
      };

      // --- UI 組件：登入畫面 ---
      const renderLogin = () => (
        <div className="min-h-screen flex items-center justify-center bg-indigo-900 p-4">
          <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md animate-in fade-in zoom-in duration-300">
            <div className="flex flex-col items-center mb-8">
              <div className="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mb-4">
                <BrainCircuit size={32} />
              </div>
              <h1 className="text-2xl font-bold text-slate-800">AI 數學導師登入</h1>
              <p className="text-slate-500 text-sm mt-1">請輸入您的代號與密碼</p>
            </div>
            
            <form onSubmit={handleLogin} className="space-y-5">
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-2 flex items-center gap-2"><User size={16}/> 登入代號</label>
                <input 
                  type="text" 
                  value={loginUsername}
                  onChange={(e) => setLoginUsername(e.target.value)}
                  placeholder="例如: admin 或 student1"
                  className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition-all bg-slate-50"
                  required
                />
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-2 flex items-center gap-2"><Lock size={16}/> 密碼</label>
                <input 
                  type="password" 
                  value={loginPassword}
                  onChange={(e) => setLoginPassword(e.target.value)}
                  placeholder="請輸入密碼"
                  className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition-all bg-slate-50"
                  required
                />
              </div>
              <button 
                type="submit" 
                disabled={isLoading || !isDbReady}
                className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white rounded-xl font-bold text-lg shadow-md transition-all flex items-center justify-center gap-2 mt-4"
              >
                {isLoading ? <Loader2 size={20} className="animate-spin" /> : '登入系統'}
              </button>
            </form>
          </div>
        </div>
      );

      // --- UI 組件：管理員後台 ---
      const renderAdminStudents = () => {
        // 修正：已移除內部的 useState

        const handleCreateStudent = async (e) => {

        return (
          <div className="max-w-5xl mx-auto space-y-6 animate-in fade-in">
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100"><h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Target className="text-indigo-600"/> 能力雷達圖</h2><div className="bg-slate-50 p-6 rounded-xl border border-slate-100 mt-4 flex justify-center"><RadarChart data={radarData} /></div></div>
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100"><h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2 mb-6"><BookmarkX className="text-red-500"/> 歷史錯題集</h2>
              {mistakes.length === 0 ? ( <div className="text-center py-10 bg-green-50 rounded-xl border border-green-100 text-green-700 font-medium">太棒了！目前沒有錯題。</div> ) : (
                <div className="space-y-4">
                  {mistakes.map((m, i) => (
                    <div key={i} className="p-5 border border-slate-100 rounded-xl bg-slate-50 hover:border-indigo-200 transition-colors">
                      <div className="flex justify-between items-start mb-2"><div className="flex items-center gap-2"><span className="text-xs font-bold bg-indigo-100 text-indigo-700 px-2 py-1 rounded">{m.topic}</span><span className="text-xs text-slate-400">{m.date}</span></div><button onClick={() => handleRemoveMistake(m.reportId, m.detailIndex)} className="text-slate-400 hover:text-red-500 transition-colors bg-white p-1.5 rounded-md border border-slate-200 shadow-sm"><Trash2 size={16}/></button></div>
                      <p className="font-medium text-slate-800 mb-3">{formatMathText(m.question)}</p>
                      <div className="flex gap-4 text-sm"><div className="flex-1 bg-white p-2 rounded border border-slate-200"><span className="text-slate-400 text-xs block">你的答案</span><span className="text-red-600 font-medium">{formatMathText(m.studentAnswer)}</span></div><div className="flex-1 bg-white p-2 rounded border border-green-200"><span className="text-green-600 text-xs block">正確答案</span><span className="text-green-700 font-medium">{formatMathText(m.correctAnswer)}</span></div></div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      };

      // --- 主佈局與導航 ---
      if (!loggedInUser) {
        return <>{errorToastContent}{renderLogin()}</>;
      }

      const isAdmin = loggedInUser.role === 'admin';
      const navItems = isAdmin 
        ? [ { id: 'admin_students', icon: Users, label: '學生管理' }, { id: 'settings', icon: Settings, label: '系統設定' } ]
        : [ { id: 'home', icon: BookOpen, label: '學習主頁' }, { id: 'records', icon: BarChart2, label: '我的記錄' }, { id: 'mistakes', icon: BookmarkX, label: '分析與錯題' }, { id: 'settings', icon: Settings, label: '帳號設定' } ];

      const renderSidebar = () => (
        <div className="w-64 bg-indigo-900 text-white min-h-screen p-6 flex flex-col shadow-xl hidden md:flex fixed top-0 left-0 h-full z-10">
          <div className="flex items-center gap-3 mb-8">
            <BrainCircuit size={32} className="text-indigo-300" />
            <h1 className="text-xl font-bold tracking-wider">AI 數學導師</h1>
          </div>
          <nav className="flex-1 space-y-2">
            {navItems.map(item => (
              <button key={item.id} onClick={() => setCurrentView(item.id)} className={`flex items-center gap-3 w-full p-3 rounded-lg transition-colors ${currentView === item.id || (item.id === 'home' && (currentView === 'quiz' || currentView === 'report')) ? 'bg-indigo-700 text-white font-medium' : 'text-indigo-200 hover:bg-indigo-800 hover:text-white'}`}>
                <item.icon size={20} /><span>{item.label}</span>
              </button>
            ))}
          </nav>
          <div className="mt-auto pt-6 border-t border-indigo-700">
            <div className="flex items-center justify-between mb-2">
              <span className="text-sm font-medium text-indigo-200 flex items-center gap-2"><User size={16}/> {isAdmin ? '管理員' : '學生'}</span>
              <button onClick={handleLogout} title="登出" className="text-indigo-300 hover:text-white transition-colors"><LogOut size={18}/></button>
            </div>
            <div className="font-bold text-lg">{loggedInUser.name}</div>
            {!isAdmin && (
              <>
                <div className="text-indigo-200 text-sm">{loggedInUser.grade} • {loggedInUser.age}歲</div>
                <div className="mt-2 w-full bg-indigo-950 rounded-full h-2.5">
                  <div className="bg-green-400 h-2.5 rounded-full transition-all" style={{ width: `${loggedInUser.abilityScore || 50}%` }}></div>
                </div>
                <div className="text-xs text-indigo-400 mt-1 text-right">能力值: {loggedInUser.abilityScore || 50}</div>
              </>
            )}
          </div>
        </div>
      );

      return (
        <div className="flex min-h-screen">
          {errorToastContent}
          {renderSidebar()}

          {/* 手機版頂部導航 */}
          <div className="md:hidden fixed top-0 w-full bg-indigo-900 text-white p-4 flex justify-between items-center z-40 shadow-md">
            <div className="flex items-center gap-2 font-bold"><BrainCircuit size={24} /> AI 導師</div>
            <div className="flex gap-4">
              {navItems.map(item => <button key={item.id} onClick={() => setCurrentView(item.id)}><item.icon size={20}/></button>)}
              <button onClick={handleLogout}><LogOut size={20}/></button>
            </div>
          </div>

          <main className="flex-1 p-6 md:p-10 pt-20 md:pt-10 h-screen overflow-y-auto relative md:ml-64 bg-slate-50">
            {isLoading && (
              <div className="absolute inset-0 z-50 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center">
                <Loader2 size={48} className="text-indigo-600 animate-spin mb-4" />
                <p className="text-lg font-medium text-slate-700">{loadingText}</p>
              </div>
            )}

            {currentView === 'home' && renderHome()}
            {currentView === 'quiz' && renderQuiz()}
            {currentView === 'report' && renderReport()}
            {currentView === 'records' && renderRecords()}
            {currentView === 'mistakes' && renderMistakes()}
            {currentView === 'settings' && renderSettings()}
            {currentView === 'admin_students' && isAdmin && renderAdminStudents()}
          </main>
        </div>
      );
    }

    // --- 6. 啟動 React 應用程式 ---
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
