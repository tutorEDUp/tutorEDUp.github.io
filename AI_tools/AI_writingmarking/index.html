<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 自動批改系統 (DSE 版本)</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 自訂滾動條樣式 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 p-4 md:p-8 font-sans min-h-screen">

  <div class="max-w-7xl mx-auto space-y-6">
    
    <!-- Header -->
    <header class="flex flex-col md:flex-row items-start md:items-center justify-between bg-white p-6 rounded-2xl shadow-sm border border-slate-100 gap-4">
      <div class="flex items-center space-x-3">
        <div class="bg-indigo-100 p-3 rounded-xl text-indigo-600">
          <i data-lucide="bot" class="w-8 h-8"></i>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-slate-900">AI 自動批改系統 (DSE 版本)</h1>
          <p class="text-slate-500 text-sm mt-1">支援圖片錯誤定位、DSE Marking Scheme 評分標準</p>
        </div>
      </div>
      <div class="hidden md:flex flex-col items-end text-sm text-slate-500 bg-slate-50 p-3 rounded-lg border border-slate-100">
        <div class="font-semibold text-slate-700 flex items-center mb-1">
          <i data-lucide="coins" class="w-4 h-4 mr-1 text-amber-500"></i>
          API 費率估算 (qwen-vl-max)
        </div>
        <div>輸入: ~0.003 RMB / 千 Tokens</div>
        <div>輸出: ~0.009 RMB / 千 Tokens</div>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      
      <!-- 左側：設定區 -->
      <div class="lg:col-span-4 xl:col-span-3 space-y-6">
        
        <!-- API 設置 -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
          <h2 class="text-lg font-semibold mb-4 flex items-center">
            <i data-lucide="key" class="w-5 h-5 mr-2 text-slate-400"></i>
            系統設定
          </h2>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">DashScope API Key</label>
            <input type="password" id="apiKey" placeholder="sk-..." class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
          </div>
        </div>

        <!-- 作業資料 -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-4">
          <h2 class="text-lg font-semibold mb-2 flex items-center">
            <i data-lucide="file-text" class="w-5 h-5 mr-2 text-slate-400"></i>
            作業資料
          </h2>
          
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center">
              <i data-lucide="book-open" class="w-4 h-4 mr-1"></i> 科目
            </label>
            <input type="text" id="subject" placeholder="例如：DSE 數學 Core" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center">
                <i data-lucide="graduation-cap" class="w-4 h-4 mr-1"></i> 年級
              </label>
              <input type="text" id="grade" placeholder="S6" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center">
                <i data-lucide="calculator" class="w-4 h-4 mr-1"></i> 滿分
              </label>
              <input type="number" id="maxScore" value="100" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center">
              <i data-lucide="list-checks" class="w-4 h-4 mr-1"></i> Marking Scheme
            </label>
            <textarea id="markingScheme" rows="8" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none resize-y text-sm font-mono" placeholder="[參考 DSE Marking Scheme 格式]
例題 1：
(a) 設 y = k1 + k2 * x  (1M)
    代入 (1, 3) 得到 3 = k1 + k2  (1M)
    解得 k1 = 1, k2 = 2  (1A)
(b) 當 x = 4, y = 1 + 2(4) = 9  (1A)

*備註：
- (1M) Method mark：列出正確步驟給分
- (1A) Answer mark：答案正確給分"></textarea>
          </div>
        </div>
      </div>

      <!-- 右側：圖片上傳與批改結果 -->
      <div class="lg:col-span-8 xl:col-span-9 space-y-6 flex flex-col">
        
        <!-- 作業圖片區 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex-grow">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold flex items-center">
              <i data-lucide="image" class="w-5 h-5 mr-2 text-slate-400"></i>
              學生作業區
            </h2>
            <div id="imageControls" class="hidden flex space-x-3">
              <button id="addMoreBtn" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">+ 新增圖片</button>
              <button id="clearAllBtn" class="text-slate-500 hover:text-slate-700 text-sm font-medium">全部清除</button>
            </div>
          </div>
          
          <input type="file" id="fileInput" multiple accept="image/*" class="hidden">
          
          <!-- 拖曳上傳區 -->
          <div id="uploadZone" class="border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center justify-center p-12 text-center hover:bg-slate-50 transition-colors cursor-pointer">
            <i data-lucide="upload" class="w-12 h-12 text-slate-400 mb-4"></i>
            <p class="text-slate-700 font-medium mb-1">點擊或拖曳圖片至此處上傳 (可多選)</p>
            <p class="text-slate-500 text-sm">支援 JPG, PNG 等格式</p>
          </div>

          <!-- 圖片預覽區 (隱藏直到有圖片) -->
          <div id="previewZone" class="hidden flex-col items-center bg-slate-100 rounded-xl overflow-hidden p-4 space-y-6 overflow-y-auto max-h-[800px]">
            <!-- 圖片將透過 JS 插入這裡 -->
          </div>

          <button id="gradeBtn" class="mt-6 w-full py-3.5 rounded-xl font-bold text-lg flex items-center justify-center transition-all shadow-sm bg-slate-200 text-slate-400 cursor-not-allowed" disabled>
            <i data-lucide="bot" class="w-5 h-5 mr-2" id="gradeIcon"></i>
            <span id="gradeBtnText">開始 AI 批改與錯誤標註</span>
          </button>

          <!-- 訊息提示區 -->
          <div id="errorBox" class="hidden mt-4 p-4 bg-red-50 text-red-700 rounded-lg flex items-start border border-red-100">
            <i data-lucide="alert-circle" class="w-5 h-5 mr-2 flex-shrink-0 mt-0.5"></i>
            <p id="errorText" class="text-sm"></p>
          </div>
        </div>

        <!-- 批改結果編輯區 (預設隱藏) -->
        <div id="resultsPanel" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-slate-100 transition-all duration-500 opacity-0 translate-y-4">
          
          <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b pb-4 gap-4">
            <h2 class="text-lg font-semibold flex items-center text-slate-800">
              <i data-lucide="check-circle-2" class="w-5 h-5 mr-2 text-indigo-500"></i>
              批改結果編輯面板
            </h2>
            
            <div class="flex items-center gap-4">
              <!-- 動態顯示成本 -->
              <div id="costDisplay" class="hidden items-center text-sm font-medium text-amber-700 bg-amber-50 px-3 py-1.5 rounded-lg border border-amber-100">
                <i data-lucide="coins" class="w-4 h-4 mr-1.5"></i>
                <span id="costHkd"></span>
                <span id="costTokens" class="text-amber-500 text-xs ml-2 font-normal hidden sm:inline"></span>
              </div>

              <button id="saveBtn" class="flex items-center text-sm font-medium text-white bg-indigo-600 px-4 py-2 rounded-lg hover:bg-indigo-700 transition-colors shadow-sm">
                <i data-lucide="save" class="w-4 h-4 mr-2"></i> 儲存批改記錄
              </button>
            </div>
          </div>

          <div id="successBox" class="hidden mb-6 p-3 bg-green-50 text-green-700 rounded-lg flex items-center border border-green-100">
            <i data-lucide="check-circle-2" class="w-5 h-5 mr-2 flex-shrink-0"></i>
            <p id="successText" class="text-sm"></p>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-1">
              <label class="block text-sm font-semibold text-slate-700 mb-2">最終得分</label>
              <div class="flex items-end">
                <input type="text" id="resultScore" class="w-full text-3xl font-bold text-indigo-600 px-4 py-3 border border-indigo-200 bg-indigo-50/50 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                <span class="text-slate-400 ml-2 mb-2 text-lg" id="scoreMaxLabel">/ 100</span>
              </div>
            </div>

            <div class="md:col-span-2">
              <label class="block text-sm font-semibold text-slate-700 mb-2">整體評語</label>
              <textarea id="resultComment" rows="4" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none resize-y text-slate-700 leading-relaxed"></textarea>
            </div>
          </div>

          <!-- 錯處列表編輯區 -->
          <div id="annotationsListContainer" class="hidden mt-8 pt-6 border-t border-slate-100">
            <h3 class="text-md font-semibold text-slate-800 mb-4 flex items-center">
              <i data-lucide="message-square-warning" class="w-5 h-5 mr-2 text-red-500"></i>
              圖面錯誤標註明細 (對應上方圖片紅框)
            </h3>
            <div id="annotationsList" class="space-y-3">
              <!-- 動態生成文字方塊 -->
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script>
    // 初始化 Lucide 圖標
    lucide.createIcons();

    // 狀態變數
    let imagePreviews = []; // Base64 字串陣列
    let annotations = [];   // 標註資料陣列
    let isGrading = false;

    // DOM 元素選取
    const fileInput = document.getElementById('fileInput');
    const uploadZone = document.getElementById('uploadZone');
    const previewZone = document.getElementById('previewZone');
    const imageControls = document.getElementById('imageControls');
    const gradeBtn = document.getElementById('gradeBtn');
    const gradeBtnText = document.getElementById('gradeBtnText');
    const gradeIcon = document.getElementById('gradeIcon');
    const errorBox = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');
    
    const resultsPanel = document.getElementById('resultsPanel');
    const successBox = document.getElementById('successBox');
    const successText = document.getElementById('successText');
    const costDisplay = document.getElementById('costDisplay');
    const costHkd = document.getElementById('costHkd');
    const costTokens = document.getElementById('costTokens');
    
    const resultScore = document.getElementById('resultScore');
    const resultComment = document.getElementById('resultComment');
    const annotationsListContainer = document.getElementById('annotationsListContainer');
    const annotationsList = document.getElementById('annotationsList');
    const scoreMaxLabel = document.getElementById('scoreMaxLabel');

    // 監聽滿分變更
    document.getElementById('maxScore').addEventListener('input', (e) => {
      scoreMaxLabel.textContent = `/ ${e.target.value || 100}`;
    });

    // 檔案上傳相關事件
    uploadZone.addEventListener('click', () => fileInput.click());
    document.getElementById('addMoreBtn').addEventListener('click', () => fileInput.click());
    document.getElementById('clearAllBtn').addEventListener('click', clearImages);

    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('bg-slate-50', 'border-indigo-300');
    });
    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('bg-slate-50', 'border-indigo-300');
    });
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('bg-slate-50', 'border-indigo-300');
      processFiles(Array.from(e.dataTransfer.files));
    });

    fileInput.addEventListener('change', (e) => {
      processFiles(Array.from(e.target.files));
      fileInput.value = ''; // 允許重複上傳相同檔案
    });

    function processFiles(files) {
      const validFiles = files.filter(f => f.type.startsWith('image/'));
      if (validFiles.length === 0) return;
      
      hideError();
      let loadedCount = 0;

      validFiles.forEach(file => {
        const reader = new FileReader();
        reader.onloadend = () => {
          imagePreviews.push(reader.result);
          loadedCount++;
          if (loadedCount === validFiles.length) {
            updateImageUI();
          }
        };
        reader.readAsDataURL(file);
      });
      resetResults();
    }

    function clearImages() {
      imagePreviews = [];
      updateImageUI();
      resetResults();
    }

    function updateImageUI() {
      if (imagePreviews.length === 0) {
        uploadZone.classList.remove('hidden');
        uploadZone.classList.add('flex');
        previewZone.classList.add('hidden');
        previewZone.classList.remove('flex');
        imageControls.classList.add('hidden');
        
        gradeBtn.classList.add('bg-slate-200', 'text-slate-400', 'cursor-not-allowed');
        gradeBtn.classList.remove('bg-indigo-600', 'text-white', 'hover:bg-indigo-700', 'hover:shadow-md');
        gradeBtn.disabled = true;
      } else {
        uploadZone.classList.add('hidden');
        uploadZone.classList.remove('flex');
        previewZone.classList.remove('hidden');
        previewZone.classList.add('flex');
        imageControls.classList.remove('hidden');
        
        gradeBtn.classList.remove('bg-slate-200', 'text-slate-400', 'cursor-not-allowed');
        gradeBtn.classList.add('bg-indigo-600', 'text-white', 'hover:bg-indigo-700', 'hover:shadow-md');
        gradeBtn.disabled = false;

        renderPreviewImages();
      }
    }

    function renderPreviewImages() {
      previewZone.innerHTML = ''; // 清空
      
      imagePreviews.forEach((url, imgIdx) => {
        const container = document.createElement('div');
        container.className = 'relative inline-flex flex-col max-w-full shadow-md bg-white';
        
        // 圖片序號標籤
        const badge = document.createElement('div');
        badge.className = 'absolute top-2 left-2 bg-slate-900/70 text-white text-xs px-2 py-1 rounded shadow-sm z-10';
        badge.textContent = `第 ${imgIdx + 1} 張`;
        container.appendChild(badge);

        // 圖片本體
        const img = document.createElement('img');
        img.src = url;
        img.className = 'block max-w-full h-auto';
        img.style.maxHeight = '600px';
        container.appendChild(img);

        // 繪製對應的標註框
        annotations.forEach((ann, annIdx) => {
          const targetImageIdx = ann.image_index !== undefined ? ann.image_index : 0;
          if (targetImageIdx !== imgIdx || !ann.box_2d) return;

          let ymin, xmin, ymax, xmax;
          if (Array.isArray(ann.box_2d) && ann.box_2d.length === 4) {
            [ymin, xmin, ymax, xmax] = ann.box_2d;
          } else if (typeof ann.box_2d === 'object') {
            ymin = ann.box_2d.ymin ?? ann.box_2d.top ?? 0;
            xmin = ann.box_2d.xmin ?? ann.box_2d.left ?? 0;
            ymax = ann.box_2d.ymax ?? ann.box_2d.bottom ?? 0;
            xmax = ann.box_2d.xmax ?? ann.box_2d.right ?? 0;
          } else {
            return;
          }

          if (xmin > xmax) { const temp = xmin; xmin = xmax; xmax = temp; }
          if (ymin > ymax) { const temp = ymin; ymin = ymax; ymax = temp; }

          const top = `${Math.max(0, Math.min(100, ymin / 10))}%`;
          const left = `${Math.max(0, Math.min(100, xmin / 10))}%`;
          const height = `${Math.max(0, Math.min(100, (ymax - ymin) / 10))}%`;
          const width = `${Math.max(0, Math.min(100, (xmax - xmin) / 10))}%`;

          const box = document.createElement('div');
          box.className = 'absolute border-2 border-red-500 bg-red-500/20 rounded-sm group hover:bg-red-500/40 transition-all cursor-pointer';
          box.style.top = top;
          box.style.left = left;
          box.style.width = width;
          box.style.height = height;

          const numBadge = document.createElement('div');
          numBadge.className = 'absolute -top-3 -left-3 bg-red-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shadow-md z-10 group-hover:scale-110 transition-transform';
          numBadge.textContent = annIdx + 1;
          box.appendChild(numBadge);

          const tooltip = document.createElement('div');
          tooltip.className = 'absolute left-full top-0 ml-2 w-48 p-2 bg-slate-900/90 text-white text-xs rounded-lg shadow-xl opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity z-20';
          tooltip.textContent = ann.comment;
          box.appendChild(tooltip);

          container.appendChild(box);
        });

        previewZone.appendChild(container);
      });
    }

    function resetResults() {
      annotations = [];
      resultScore.value = '';
      resultComment.value = '';
      costDisplay.classList.add('hidden');
      costDisplay.classList.remove('flex');
      
      resultsPanel.classList.add('hidden', 'opacity-0', 'translate-y-4');
      resultsPanel.classList.remove('block', 'opacity-100', 'translate-y-0');
      
      renderPreviewImages(); // 重新渲染清除標註
    }

    function showError(msg) {
      errorText.textContent = msg;
      errorBox.classList.remove('hidden');
    }

    function hideError() {
      errorBox.classList.add('hidden');
    }

    function showSuccess(msg) {
      successText.textContent = msg;
      successBox.classList.remove('hidden');
      setTimeout(() => { successBox.classList.add('hidden'); }, 4000);
    }

    // 呼叫 API
    gradeBtn.addEventListener('click', async () => {
      const apiKey = document.getElementById('apiKey').value.trim();
      const subject = document.getElementById('subject').value.trim();
      const grade = document.getElementById('grade').value.trim();
      const maxScore = document.getElementById('maxScore').value.trim();
      const markingScheme = document.getElementById('markingScheme').value.trim();

      if (!apiKey) return showError('請輸入 API Key。');
      if (imagePreviews.length === 0) return showError('請先上傳學生的作業圖片。');

      // 設定 UI 為 Loading 狀態
      isGrading = true;
      hideError();
      resetResults();
      
      gradeBtn.disabled = true;
      gradeBtn.classList.add('bg-slate-200', 'text-slate-500');
      gradeBtn.classList.remove('bg-indigo-600', 'text-white', 'hover:bg-indigo-700');
      gradeIcon.setAttribute('data-lucide', 'loader-2');
      gradeIcon.classList.add('animate-spin');
      gradeBtnText.textContent = 'AI 批改及定位中...';
      lucide.createIcons();

      try {
        const promptText = `
你是一個專業且嚴謹的老師，請根據以下資料批改這份學生的作業圖片（共 ${imagePreviews.length} 張）。
科目：${subject || '未指定'}
年級：${grade || '未指定'}
滿分：${maxScore || '100'}
評分標準 (Marking Scheme)：\n${markingScheme || '無提供具體標準，請根據一般學科知識進行合理批改。'}

請仔細分析圖片中的學生作答內容，對照評分標準，給予合理的分數，並提供整體評語。
最重要的是：請找出學生「出錯的位置」（或需要給予特別指導的地方），並提供該位置的 bounding box 座標。
為了徹底避免座標軸顛倒，請使用 JSON 物件輸出，數值範圍必須是 0 到 1000 的整數（代表佔整張圖片寬高的千分比，左上角為 0, 0，右下角為 1000, 1000）：
"box_2d": {
  "ymin": "框的上方邊緣 Y 座標",
  "xmin": "框的左側邊緣 X 座標",
  "ymax": "框的下方邊緣 Y 座標",
  "xmax": "框的右側邊緣 X 座標"
}

你的回覆必須是純 JSON 格式，不要包含任何其他文字或 Markdown 標記，格式如下：
{
  "score": "數值或字串，表示學生的得分",
  "general_comment": "字串，表示你的整體詳細評語",
  "annotations": [
    {
      "image_index": 0,
      "box_2d": { "ymin": 100, "xmin": 200, "ymax": 150, "xmax": 300 },
      "comment": "針對這個錯誤位置的具體評語（指出為何錯、如何改正）"
    }
  ]
}
如果學生完全沒有錯誤，annotations 請保留為空陣列 []。
`;

        const contentArray = [
          { type: "text", text: promptText },
          ...imagePreviews.map(url => ({ type: "image_url", image_url: { url } }))
        ];

        const payload = {
          model: "qwen-vl-max",
          messages: [{ role: "user", content: contentArray }],
          temperature: 0.1,
        };

        const response = await fetch('https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error?.message || `API 請求失敗 (狀態碼: ${response.status})`);
        }

        const data = await response.json();
        const content = data.choices[0].message.content;

        // 計算成本
        if (data.usage) {
          const inTokens = data.usage.prompt_tokens || 0;
          const outTokens = data.usage.completion_tokens || 0;
          const hkd = ((inTokens / 1000) * 0.003 + (outTokens / 1000) * 0.009) * 1.08;
          
          costHkd.textContent = hkd.toFixed(4);
          costTokens.textContent = `(使用 ${inTokens} + ${outTokens} Tokens)`;
          costDisplay.classList.remove('hidden');
          costDisplay.classList.add('flex');
        }

        let parsedResult;
        try {
          const cleaned = content.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
          parsedResult = JSON.parse(cleaned);
        } catch (e) {
          throw new Error("AI 回覆格式非標準 JSON，無法解析。原始內容：\n" + content);
        }

        resultScore.value = parsedResult.score || '';
        resultComment.value = parsedResult.general_comment || parsedResult.comment || '';
        annotations = Array.isArray(parsedResult.annotations) ? parsedResult.annotations : [];
        
        showSuccess('AI 批改完成！錯誤已在圖上標出，您可以編輯結果。');
        renderResultsUI();

      } catch (err) {
        showError(err.message || '發生未知錯誤');
      } finally {
        isGrading = false;
        gradeBtn.disabled = false;
        gradeBtn.classList.remove('bg-slate-200', 'text-slate-500');
        gradeBtn.classList.add('bg-indigo-600', 'text-white', 'hover:bg-indigo-700');
        gradeIcon.setAttribute('data-lucide', 'bot');
        gradeIcon.classList.remove('animate-spin');
        gradeBtnText.textContent = '開始 AI 批改與錯誤標註';
        lucide.createIcons();
      }
    });

    function renderResultsUI() {
      // 顯示面板
      resultsPanel.classList.remove('hidden');
      setTimeout(() => {
        resultsPanel.classList.remove('opacity-0', 'translate-y-4');
        resultsPanel.classList.add('opacity-100', 'translate-y-0');
      }, 50);

      // 渲染圖片框線
      renderPreviewImages();

      // 渲染編輯明細列表
      if (annotations.length > 0) {
        annotationsListContainer.classList.remove('hidden');
        annotationsList.innerHTML = '';
        
        annotations.forEach((ann, idx) => {
          const itemDiv = document.createElement('div');
          itemDiv.className = 'flex items-start space-x-3 bg-red-50/50 p-3 rounded-xl border border-red-100';
          
          const numBadge = document.createElement('div');
          numBadge.className = 'flex-shrink-0 bg-red-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold mt-1';
          numBadge.textContent = idx + 1;
          
          const contentDiv = document.createElement('div');
          contentDiv.className = 'flex-grow flex flex-col space-y-2';
          
          if (imagePreviews.length > 1) {
            const imgLabel = document.createElement('span');
            imgLabel.className = 'text-xs font-medium text-red-800 bg-red-200 self-start px-2 py-0.5 rounded';
            imgLabel.textContent = `第 ${(ann.image_index !== undefined ? ann.image_index : 0) + 1} 張圖片`;
            contentDiv.appendChild(imgLabel);
          }
          
          const textarea = document.createElement('textarea');
          textarea.rows = 2;
          textarea.value = ann.comment;
          textarea.className = 'w-full px-3 py-2 border border-red-200 rounded-lg focus:ring-2 focus:ring-red-500 outline-none resize-y text-sm text-slate-700 bg-white';
          
          // 即時更新綁定的資料並重繪圖層 (以更新 tooltip)
          textarea.addEventListener('input', (e) => {
            annotations[idx].comment = e.target.value;
            renderPreviewImages(); 
          });

          contentDiv.appendChild(textarea);
          itemDiv.appendChild(numBadge);
          itemDiv.appendChild(contentDiv);
          annotationsList.appendChild(itemDiv);
        });
      } else {
        annotationsListContainer.classList.add('hidden');
      }
    }

    // 儲存按鈕
    document.getElementById('saveBtn').addEventListener('click', () => {
      showSuccess('批改結果已儲存！');
    });

  </script>
</body>
</html>
