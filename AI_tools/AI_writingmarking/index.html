<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 自動批改系統 (DSE 版本)</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- PDF.js 庫 (用於處理 PDF 轉圖片) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    // 設定 PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <style>
    /* 自訂滾動條樣式 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    /* 防止在畫布上滑動時觸發頁面滾動 */
    .drawing-canvas { touch-action: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 p-4 md:p-8 font-sans min-h-screen">

  <div class="max-w-7xl mx-auto space-y-6">
    
    <!-- Header -->
    <header class="flex flex-col md:flex-row items-start md:items-center justify-between bg-white p-6 rounded-2xl shadow-sm border border-slate-100 gap-4">
      <div class="flex items-center space-x-3">
        <div class="bg-indigo-100 p-3 rounded-xl text-indigo-600">
          <i data-lucide="bot" class="w-8 h-8"></i>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-slate-900" data-i18n="appTitle">AI 自動批改系統 (DSE 版本)</h1>
          <p class="text-slate-500 text-sm mt-1" data-i18n="appDesc">支援圖片/PDF、錯誤定位、手寫標記與 DSE 評分標準</p>
        </div>
      </div>
      <div class="flex flex-row items-center gap-4">
        <!-- 語言切換按鈕 -->
        <button id="langToggleBtn" class="flex items-center space-x-2 px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-bold transition-colors border border-slate-200">
          <i data-lucide="globe" class="w-4 h-4"></i>
          <span id="langLabel">EN / 中</span>
        </button>
        <!-- 費率提示 -->
        <div class="hidden md:flex flex-col items-end text-sm text-slate-500 bg-slate-50 p-3 rounded-lg border border-slate-100">
          <div class="font-semibold text-slate-700 flex items-center mb-1">
            <i data-lucide="coins" class="w-4 h-4 mr-1 text-amber-500"></i>
            <span data-i18n="apiCostTitle">API 費率估算 (qwen-vl-max)</span>
          </div>
          <div><span data-i18n="apiCostIn">輸入</span>: ~0.003 RMB / 千 Tokens</div>
          <div><span data-i18n="apiCostOut">輸出</span>: ~0.009 RMB / 千 Tokens</div>
          <div id="exchangeRateDisplay" class="text-xs text-slate-400 mt-1">取得實時匯率中...</div>
        </div>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      
      <!-- 左側：設定區 -->
      <div class="lg:col-span-4 xl:col-span-3 space-y-6">
        
        <!-- API 設置 -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
          <h2 class="text-lg font-semibold mb-4 flex items-center">
            <i data-lucide="key" class="w-5 h-5 mr-2 text-slate-400"></i>
            <span data-i18n="sysSettings">系統設定</span>
          </h2>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">DashScope API Key</label>
            <input type="password" id="apiKey" placeholder="sk-..." class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
          </div>
        </div>

        <!-- 作業資料 -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-4">
          <h2 class="text-lg font-semibold mb-2 flex items-center">
            <i data-lucide="file-text" class="w-5 h-5 mr-2 text-slate-400"></i>
            <span data-i18n="assignmentData">作業資料</span>
          </h2>
          
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center">
              <i data-lucide="book-open" class="w-4 h-4 mr-1"></i> <span data-i18n="subject">科目</span>
            </label>
            <input type="text" id="subject" data-i18n-placeholder="phSubject" placeholder="例如：DSE 數學 Core" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center">
                <i data-lucide="graduation-cap" class="w-4 h-4 mr-1"></i> <span data-i18n="grade">年級</span>
              </label>
              <input type="text" id="grade" placeholder="S6" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center">
                <i data-lucide="calculator" class="w-4 h-4 mr-1"></i> <span data-i18n="maxScore">滿分</span>
              </label>
              <input type="number" id="maxScore" value="100" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center">
              <i data-lucide="list-checks" class="w-4 h-4 mr-1"></i> Marking Scheme
            </label>
            <textarea id="markingScheme" rows="8" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none resize-y text-sm font-mono" data-i18n-placeholder="phMarkingScheme" placeholder="[參考 DSE Marking Scheme 格式]
例題 1：
(a) 設 y = k1 + k2 * x  (1M)
    代入 (1, 3) 得到 3 = k1 + k2  (1M)
    解得 k1 = 1, k2 = 2  (1A)
(b) 當 x = 4, y = 1 + 2(4) = 9  (1A)

*備註：
- (1M) Method mark：列出正確步驟給分
- (1A) Answer mark：答案正確給分"></textarea>
          </div>
        </div>
      </div>

      <!-- 右側：圖片上傳與批改結果 -->
      <div class="lg:col-span-8 xl:col-span-9 space-y-6 flex flex-col">
        
        <!-- 作業圖片區 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex-grow">
          
          <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
            <h2 class="text-lg font-semibold flex items-center">
              <i data-lucide="image" class="w-5 h-5 mr-2 text-slate-400"></i>
              <span data-i18n="studentWorkArea">學生作業區</span>
            </h2>

            <!-- 繪圖工具列 (預設隱藏) -->
            <div id="drawingToolbar" class="hidden flex-row items-center bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200 gap-2">
              <button id="toolPen" class="p-1.5 rounded-md bg-indigo-100 text-indigo-700 hover:bg-indigo-200 tooltip-container relative" title="畫筆">
                <i data-lucide="pen-tool" class="w-4 h-4"></i>
              </button>
              <button id="toolEraser" class="p-1.5 rounded-md text-slate-500 hover:bg-slate-200 tooltip-container relative" title="擦膠">
                <i data-lucide="eraser" class="w-4 h-4"></i>
              </button>
              <div class="h-5 w-px bg-slate-300 mx-1"></div>
              <!-- 顏色選擇 -->
              <button class="color-btn w-5 h-5 rounded-full bg-red-500 ring-2 ring-offset-1 ring-slate-400" data-color="#ef4444"></button>
              <button class="color-btn w-5 h-5 rounded-full bg-blue-500" data-color="#3b82f6"></button>
              <button class="color-btn w-5 h-5 rounded-full bg-slate-900" data-color="#0f172a"></button>
              <div class="h-5 w-px bg-slate-300 mx-1"></div>
              <!-- 粗細 -->
              <input type="range" id="lineWidth" min="1" max="10" value="3" class="w-20 accent-indigo-600">
              <div class="h-5 w-px bg-slate-300 mx-1"></div>
              <button id="clearCanvasBtn" class="text-xs font-medium text-slate-600 hover:text-red-600 px-2 py-1 rounded" data-i18n="clearDrawing">清空筆跡</button>
            </div>

            <div id="imageControls" class="hidden flex space-x-3">
              <button id="addMoreBtn" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">+ <span data-i18n="addImgPdf">新增圖片/PDF</span></button>
              <button id="clearAllBtn" class="text-slate-500 hover:text-slate-700 text-sm font-medium" data-i18n="clearAll">全部清除</button>
            </div>
          </div>
          
          <input type="file" id="fileInput" multiple accept="image/*,application/pdf" class="hidden">
          
          <!-- 拖曳上傳區 -->
          <div id="uploadZone" class="border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center justify-center p-12 text-center hover:bg-slate-50 transition-colors cursor-pointer">
            <i data-lucide="upload" class="w-12 h-12 text-slate-400 mb-4"></i>
            <p class="text-slate-700 font-medium mb-1" data-i18n="uploadHint">點擊或拖曳 圖片/PDF 至此處上傳 (可多選)</p>
            <p class="text-slate-500 text-sm" data-i18n="uploadFormats">支援 JPG, PNG, PDF 等格式</p>
          </div>

          <!-- 解析進度提示 -->
          <div id="loadingZone" class="hidden flex-col items-center justify-center p-12 text-center text-indigo-600">
            <i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-4"></i>
            <p class="font-medium" data-i18n="processingFiles">正在處理檔案，請稍候...</p>
          </div>

          <!-- 圖片預覽區 -->
          <div id="previewZone" class="hidden flex-col items-center bg-slate-100 rounded-xl overflow-hidden p-4 space-y-6 overflow-y-auto max-h-[800px] relative">
            <!-- 圖片與 Canvas 將透過 JS 插入這裡 -->
          </div>

          <button id="gradeBtn" class="mt-6 w-full py-3.5 rounded-xl font-bold text-lg flex items-center justify-center transition-all shadow-sm bg-slate-200 text-slate-400 cursor-not-allowed" disabled>
            <i data-lucide="bot" class="w-5 h-5 mr-2" id="gradeIcon"></i>
            <span id="gradeBtnText" data-i18n="startGradingBtn">開始 AI 批改與錯誤標註</span>
          </button>

          <!-- 訊息提示區 -->
          <div id="errorBox" class="hidden mt-4 p-4 bg-red-50 text-red-700 rounded-lg flex items-start border border-red-100">
            <i data-lucide="alert-circle" class="w-5 h-5 mr-2 flex-shrink-0 mt-0.5"></i>
            <p id="errorText" class="text-sm"></p>
          </div>
        </div>

        <!-- 批改結果編輯區 (預設隱藏) -->
        <div id="resultsPanel" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-slate-100 transition-all duration-500 opacity-0 translate-y-4">
          
          <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b pb-4 gap-4">
            <h2 class="text-lg font-semibold flex items-center text-slate-800">
              <i data-lucide="check-circle-2" class="w-5 h-5 mr-2 text-indigo-500"></i>
              <span data-i18n="resultPanelTitle">批改結果編輯面板</span>
            </h2>
            
            <div class="flex items-center gap-4">
              <div id="costDisplay" class="hidden items-center text-sm font-medium text-amber-700 bg-amber-50 px-3 py-1.5 rounded-lg border border-amber-100">
                <i data-lucide="coins" class="w-4 h-4 mr-1.5"></i>
                <span id="costHkd"></span>
                <span id="costTokens" class="text-amber-500 text-xs ml-2 font-normal hidden sm:inline"></span>
              </div>

              <button id="saveBtn" class="flex items-center text-sm font-medium text-white bg-indigo-600 px-4 py-2 rounded-lg hover:bg-indigo-700 transition-colors shadow-sm">
                <i data-lucide="save" class="w-4 h-4 mr-2"></i> <span data-i18n="saveResult">儲存批改記錄</span>
              </button>
            </div>
          </div>

          <div id="successBox" class="hidden mb-6 p-3 bg-green-50 text-green-700 rounded-lg flex items-center border border-green-100">
            <i data-lucide="check-circle-2" class="w-5 h-5 mr-2 flex-shrink-0"></i>
            <p id="successText" class="text-sm"></p>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-1">
              <label class="block text-sm font-semibold text-slate-700 mb-2" data-i18n="finalScoreLabel">最終得分</label>
              <div class="flex items-end">
                <input type="text" id="resultScore" class="w-full text-3xl font-bold text-indigo-600 px-4 py-3 border border-indigo-200 bg-indigo-50/50 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                <span class="text-slate-400 ml-2 mb-2 text-lg" id="scoreMaxLabel">/ 100</span>
              </div>
            </div>

            <div class="md:col-span-2">
              <label class="block text-sm font-semibold text-slate-700 mb-2" data-i18n="generalCommentLabel">整體評語</label>
              <textarea id="resultComment" rows="4" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none resize-y text-slate-700 leading-relaxed"></textarea>
            </div>
          </div>

          <!-- 錯處列表編輯區 -->
          <div id="annotationsListContainer" class="hidden mt-8 pt-6 border-t border-slate-100">
            <h3 class="text-md font-semibold text-slate-800 mb-4 flex items-center">
              <i data-lucide="message-square-warning" class="w-5 h-5 mr-2 text-red-500"></i>
              <span data-i18n="errorListTitle">圖面錯誤標註明細 (對應上方圖片紅框)</span>
            </h3>
            <div id="annotationsList" class="space-y-3">
              <!-- 動態生成文字方塊 -->
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    // ---------------- 多國語言設定 ----------------
    let currentLang = 'zh'; // 'zh' or 'en'
    const translations = {
      zh: {
        appTitle: "AI 自動批改系統 (DSE 版本)",
        appDesc: "支援圖片/PDF、錯誤定位、手寫標記與 DSE 評分標準",
        apiCostTitle: "API 費率估算 (qwen-vl-max)",
        apiCostIn: "輸入", apiCostOut: "輸出",
        sysSettings: "系統設定", assignmentData: "作業資料",
        subject: "科目", grade: "年級", maxScore: "滿分",
        phSubject: "例如：DSE 數學 Core",
        phMarkingScheme: "[參考 DSE Marking Scheme 格式]\n例題 1：\n(a) 設 y = k1 + k2 * x  (1M)\n    代入 (1, 3) 得到 3 = k1 + k2  (1M)\n    解得 k1 = 1, k2 = 2  (1A)\n(b) 當 x = 4, y = 1 + 2(4) = 9  (1A)\n\n*備註：\n- (1M) Method mark：列出正確步驟給分\n- (1A) Answer mark：答案正確給分",
        studentWorkArea: "學生作業區", clearDrawing: "清空筆跡",
        addImgPdf: "新增圖片/PDF", clearAll: "全部清除",
        uploadHint: "點擊或拖曳 圖片/PDF 至此處上傳 (可多選)", uploadFormats: "支援 JPG, PNG, PDF 等格式",
        processingFiles: "正在處理檔案，請稍候...",
        startGradingBtn: "開始 AI 批改與錯誤標註", gradingText: "AI 批改及定位中...",
        resultPanelTitle: "批改結果編輯面板", saveResult: "儲存批改記錄",
        finalScoreLabel: "最終得分", generalCommentLabel: "整體評語",
        errorListTitle: "圖面錯誤標註明細 (對應上方圖片紅框)",
        alertNoKey: "請輸入 API Key。", alertNoImg: "請先上傳學生的作業圖片或 PDF。",
        alertSuccess: "AI 批改完成！錯誤已在圖上標出，您可以編輯結果。",
        alertSaveSuccess: "批改結果已儲存！",
        pagePrefix: "第", pageSuffix: "頁/張"
      },
      en: {
        appTitle: "AI Auto-Grader System (DSE Format)",
        appDesc: "Supports Image/PDF, error bounding boxes, hand-drawing & DSE marking schemes.",
        apiCostTitle: "API Cost Est. (qwen-vl-max)",
        apiCostIn: "Input", apiCostOut: "Output",
        sysSettings: "System Settings", assignmentData: "Assignment Data",
        subject: "Subject", grade: "Grade / Form", maxScore: "Max Score",
        phSubject: "e.g., DSE Math Core",
        phMarkingScheme: "[DSE Marking Scheme Example]\nQ1:\n(a) Let y = k1 + k2 * x  (1M)\n    Sub (1, 3) to get 3 = k1 + k2  (1M)\n    Solve k1 = 1, k2 = 2  (1A)\n(b) When x = 4, y = 1 + 2(4) = 9  (1A)\n\n*Remarks:\n- (1M) Method mark: correct step/formula\n- (1A) Answer mark: correct answer",
        studentWorkArea: "Student Work Area", clearDrawing: "Clear Drawing",
        addImgPdf: "Add Image/PDF", clearAll: "Clear All",
        uploadHint: "Click or drag Images/PDFs here (Multi-select)", uploadFormats: "Supports JPG, PNG, PDF, etc.",
        processingFiles: "Processing files, please wait...",
        startGradingBtn: "Start AI Grading & Annotation", gradingText: "AI is grading...",
        resultPanelTitle: "Grading Result Editor", saveResult: "Save Results",
        finalScoreLabel: "Final Score", generalCommentLabel: "General Comment",
        errorListTitle: "Error Annotations List (Matches red boxes above)",
        alertNoKey: "Please enter API Key.", alertNoImg: "Please upload image(s) or PDF(s) first.",
        alertSuccess: "AI Grading complete! Errors are highlighted. You can now edit.",
        alertSaveSuccess: "Results saved successfully!",
        pagePrefix: "Page/Img", pageSuffix: ""
      }
    };

    function applyLanguage() {
      const dict = translations[currentLang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = dict[el.getAttribute('data-i18n')];
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        el.placeholder = dict[el.getAttribute('data-i18n-placeholder')];
      });
      document.getElementById('langLabel').textContent = currentLang === 'zh' ? 'EN / 中' : '中 / EN';
      
      // 更新按鈕狀態文字
      if (isGrading) {
        document.getElementById('gradeBtnText').textContent = dict.gradingText;
      }
      
      // 更新圖片標籤
      const badges = document.querySelectorAll('.page-badge');
      badges.forEach((badge, idx) => {
        badge.textContent = `${dict.pagePrefix} ${idx + 1} ${dict.pageSuffix}`.trim();
      });
    }

    document.getElementById('langToggleBtn').addEventListener('click', () => {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      applyLanguage();
    });

    // ---------------- 狀態變數 ----------------
    let imagePreviews = []; // { dataUrl: string, width: number, height: number }
    let annotations = [];   
    let isGrading = false;
    
    // 繪圖狀態
    let drawingCanvases = []; // 存儲每個畫布的上下文與狀態
    let currentTool = 'pen'; // 'pen' 或 'eraser'
    let strokeColor = '#ef4444';
    let strokeWidth = 3;

    // DOM 元素選取
    const fileInput = document.getElementById('fileInput');
    const uploadZone = document.getElementById('uploadZone');
    const loadingZone = document.getElementById('loadingZone');
    const previewZone = document.getElementById('previewZone');
    const imageControls = document.getElementById('imageControls');
    const drawingToolbar = document.getElementById('drawingToolbar');
    const gradeBtn = document.getElementById('gradeBtn');
    const gradeBtnText = document.getElementById('gradeBtnText');
    const gradeIcon = document.getElementById('gradeIcon');
    const errorBox = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');
    const resultsPanel = document.getElementById('resultsPanel');
    const annotationsListContainer = document.getElementById('annotationsListContainer');
    const annotationsList = document.getElementById('annotationsList');
    
    // ---------------- 繪圖工具列事件 ----------------
    const toolPen = document.getElementById('toolPen');
    const toolEraser = document.getElementById('toolEraser');
    const lineWidthInput = document.getElementById('lineWidth');
    
    toolPen.addEventListener('click', () => {
      currentTool = 'pen';
      toolPen.classList.replace('text-slate-500', 'text-indigo-700');
      toolPen.classList.replace('hover:bg-slate-200', 'hover:bg-indigo-200');
      toolPen.classList.add('bg-indigo-100');
      
      toolEraser.classList.replace('text-indigo-700', 'text-slate-500');
      toolEraser.classList.replace('hover:bg-indigo-200', 'hover:bg-slate-200');
      toolEraser.classList.remove('bg-indigo-100');
    });

    toolEraser.addEventListener('click', () => {
      currentTool = 'eraser';
      toolEraser.classList.replace('text-slate-500', 'text-indigo-700');
      toolEraser.classList.replace('hover:bg-slate-200', 'hover:bg-indigo-200');
      toolEraser.classList.add('bg-indigo-100');
      
      toolPen.classList.replace('text-indigo-700', 'text-slate-500');
      toolPen.classList.replace('hover:bg-indigo-200', 'hover:bg-slate-200');
      toolPen.classList.remove('bg-indigo-100');
    });

    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        strokeColor = e.target.getAttribute('data-color');
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('ring-2', 'ring-offset-1', 'ring-slate-400'));
        e.target.classList.add('ring-2', 'ring-offset-1', 'ring-slate-400');
        if (currentTool === 'eraser') toolPen.click(); // 自動切回畫筆
      });
    });

    lineWidthInput.addEventListener('input', (e) => { strokeWidth = e.target.value; });

    document.getElementById('clearCanvasBtn').addEventListener('click', () => {
      drawingCanvases.forEach(c => {
        c.ctx.clearRect(0, 0, c.canvas.width, c.canvas.height);
      });
    });

    // ---------------- 檔案處理 (含 PDF) ----------------

    async function processFiles(files) {
      const validFiles = files.filter(f => f.type.startsWith('image/') || f.type === 'application/pdf');
      if (validFiles.length === 0) return;
      
      hideError();
      uploadZone.classList.add('hidden');
      loadingZone.classList.remove('hidden');
      loadingZone.classList.add('flex');
      
      for (const file of validFiles) {
        if (file.type === 'application/pdf') {
          await processPDF(file);
        } else {
          await processImage(file);
        }
      }
      
      loadingZone.classList.add('hidden');
      loadingZone.classList.remove('flex');
      updateImageUI();
    }

    function processImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onloadend = () => {
          const img = new Image();
          img.onload = () => {
            imagePreviews.push({ dataUrl: reader.result, width: img.naturalWidth, height: img.naturalHeight });
            resolve();
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    async function processPDF(file) {
      const fileData = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: fileData }).promise;
      const numPages = pdf.numPages;
      
      for (let i = 1; i <= numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 2.0 }); // 提高解析度
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        
        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
        imagePreviews.push({ dataUrl, width: canvas.width, height: canvas.height });
      }
    }

    // Canvas 繪圖設定函數
    function setupDrawing(canvas, cWidth, cHeight) {
      const ctx = canvas.getContext('2d');
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      drawingCanvases.push({ canvas, ctx });

      let isDrawing = false;
      let lastX = 0;
      let lastY = 0;

      const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX = e.clientX;
        let clientY = e.clientY;
        if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        }
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY
        };
      };

      const startDrawing = (e) => {
        isDrawing = true;
        const pos = getPos(e);
        lastX = pos.x;
        lastY = pos.y;
        
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(lastX, lastY); // 點擊即畫點
        ctx.strokeStyle = currentTool === 'eraser' ? 'rgba(0,0,0,1)' : strokeColor;
        ctx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over';
        ctx.lineWidth = currentTool === 'eraser' ? strokeWidth * 5 : strokeWidth;
        ctx.stroke();
        e.preventDefault();
      };

      const draw = (e) => {
        if (!isDrawing) return;
        const pos = getPos(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        lastX = pos.x;
        lastY = pos.y;
        e.preventDefault();
      };

      const stopDrawing = () => {
        if (isDrawing) {
          ctx.closePath();
          isDrawing = false;
        }
      };

      canvas.addEventListener('mousedown', startDrawing);
      canvas.addEventListener('mousemove', draw);
      canvas.addEventListener('mouseup', stopDrawing);
      canvas.addEventListener('mouseout', stopDrawing);

      // 觸控支援 (iPad 等設備)
      canvas.addEventListener('touchstart', startDrawing, {passive: false});
      canvas.addEventListener('touchmove', draw, {passive: false});
      canvas.addEventListener('touchend', stopDrawing);
    }

Grade/Form: ${grade || 'Not specified'}
Max Score: ${maxScore || '100'}

        const promptTextZh = `你是一個專業且嚴謹的老師，請根據以下資料批改這份學生的作業圖片（共 ${imagePreviews.length} 張）。

        const contentArray = [

        ];

        const payload = {
          model: "qwen-vl-max",
          messages: [{ role: "user", content: contentArray }],
          temperature: 0.1,
          stream: true,
          stream_options: { include_usage: true }
        };

        const response = await fetch('https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`,
            'Accept': 'text/event-stream'
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error?.message || `API Error (${response.status})`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let content = "";
        let buffer = "";

        // UI 準備顯示實時成本計算
        document.getElementById('costDisplay').classList.remove('hidden');
        document.getElementById('costDisplay').classList.add('flex');
        document.getElementById('costHkd').textContent = `計算中...`;

        resultsPanel.classList.add('opacity-100', 'translate-y-0');

        // 讀取串流數據
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop(); // 保留最後一行不完整的片段
          
          for (const line of lines) {
            const trimmed = line.trim();
            if (trimmed.startsWith('data: ') && trimmed !== 'data: [DONE]') {
              try {
                const data = JSON.parse(trimmed.substring(6));
                
                if (data.choices && data.choices.length > 0 && data.choices[0].delta && data.choices[0].delta.content) {
                  content += data.choices[0].delta.content;

                  const inTokens = data.usage.prompt_tokens || 0;
                  const outTokens = data.usage.completion_tokens || 0;

                }

                // 忽略不完整 JSON 解析錯誤
              }
            }
          }
        }

        let parsedResult;
        try {
          const cleaned = content.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
          parsedResult = JSON.parse(cleaned);
        } catch (e) {
          throw new Error("Invalid JSON format from AI.\n" + content);

        annotations = Array.isArray(parsedResult.annotations) ? parsedResult.annotations : [];
        
        showSuccess('alertSuccess');
        renderResultsUI();

        if (data && data.rates && data.rates.HKD) {
          currentExchangeRate = data.rates.HKD;
          document.getElementById('exchangeRateDisplay').textContent = `實時匯率: 1 RMB ≈ ${currentExchangeRate.toFixed(4)} HKD`;
        }
      } catch(e) {
        document.getElementById('exchangeRateDisplay').textContent = `預設匯率: 1 RMB ≈ 1.08 HKD`;
        console.warn('無法取得實時匯率，使用預設值。', e);
      }
    }
    
    fetchLiveExchangeRate();

  </script>
</body>
</html>
